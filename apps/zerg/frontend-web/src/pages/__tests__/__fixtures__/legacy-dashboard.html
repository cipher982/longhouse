<div id="dashboard" class="dashboard">
  <div class="dashboard-header">
    <div class="button-container">
      <button id="create-automation-button" type="button" class="create-fiche-button" data-testid="create-automation-btn">Create Automation</button>
    </div>
  </div>
  <table id="fiches-table" class="fiches-table">
    <thead>
      <tr>
        <th scope="col" data-column="name" role="button" tabindex="0">Name<span class="sort-indicator">▲</span></th>
        <th scope="col" data-column="status" role="button" tabindex="0">Status</th>
        <th scope="col" data-column="last_run" role="button" tabindex="0">Last Run</th>
        <th scope="col" data-column="next_run" role="button" tabindex="0">Next Run</th>
        <th scope="col" data-column="success_rate" role="button" tabindex="0">Success Rate</th>
        <th scope="col" class="actions-header" data-column="actions" role="button" tabindex="0">Actions</th>
      </tr>
    </thead>
    <tbody id="fiches-table-body">
      <tr data-automation-id="1" tabindex="0">
        <td data-label="Name">Alpha</td>
        <td data-label="Status"><span class="status-indicator status-running">● Running</span></td>
        <td data-label="Last Run">2025-09-24&nbsp;10:00</td>
        <td data-label="Next Run">2025-09-24&nbsp;12:00</td>
        <td data-label="Success Rate">0.0% (0)</td>
        <td class="actions-cell" data-label="Actions">
          <div class="actions-cell-inner">
            <button type="button" class="action-btn run-btn disabled" data-testid="run-automation-1" disabled="" title="Automation is already running" aria-label="Automation is already running"><i data-feather="play"></i></button>
            <button type="button" class="action-btn edit-btn" data-testid="edit-automation-1" title="Edit Automation" aria-label="Edit Automation"><i data-feather="edit-3"></i></button>
            <button type="button" class="action-btn chat-btn" data-testid="chat-automation-1" title="Open automation chat" aria-label="Open automation chat"><i data-feather="message-circle"></i></button>
            <button type="button" class="action-btn debug-btn" data-testid="debug-automation-1" title="Automation settings" aria-label="Automation settings"><i data-feather="settings"></i></button>
            <button type="button" class="action-btn delete-btn" data-testid="delete-automation-1" title="Delete automation" aria-label="Delete automation"><i data-feather="trash-2"></i></button>
          </div>
        </td>
      </tr>
      <tr data-automation-id="2" class="error-row" tabindex="0">
        <td data-label="Name">Beta</td>
        <td data-label="Status"><span class="status-indicator status-error">⚠ Error</span><span class="info-icon" title="Failed to execute">ℹ</span></td>
        <td data-label="Last Run">-</td>
        <td data-label="Next Run">-</td>
        <td data-label="Success Rate">0.0% (0)</td>
        <td class="actions-cell" data-label="Actions">
          <div class="actions-cell-inner">
            <button type="button" class="action-btn run-btn" data-testid="run-automation-2" title="Run automation" aria-label="Run automation"><i data-feather="play"></i></button>
            <button type="button" class="action-btn edit-btn" data-testid="edit-automation-2" title="Edit Automation" aria-label="Edit Automation"><i data-feather="edit-3"></i></button>
            <button type="button" class="action-btn chat-btn" data-testid="chat-automation-2" title="Open automation chat" aria-label="Open automation chat"><i data-feather="message-circle"></i></button>
            <button type="button" class="action-btn debug-btn" data-testid="debug-automation-2" title="Automation settings" aria-label="Automation settings"><i data-feather="settings"></i></button>
            <button type="button" class="action-btn delete-btn" data-testid="delete-automation-2" title="Delete automation" aria-label="Delete automation"><i data-feather="trash-2"></i></button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
