truth_source = "codex_bridge"
required_observers = ["managed_sessions_snapshot", "timeline_sse", "browser_card", "hosted_db"]
metrics = ["warm_close_local_to_paint_ms", "warm_close_local_to_db_ms"]
notes = "Validates that active-turn shutdown does not leave stale working state on the card."

[[cases]]
id = "managed_codex_ssh_disconnect"
status = "experimental"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "honest-degradation"
profile_class = "honest_degradation"
profiler_driver = "managed_codex_ssh_disconnect"
ci_mode = "blocked"
blocked_reason = "Requires an SSH/PTY harness that distinguishes terminal relationship loss from provider process death."
launch = "longhouse codex over SSH"
shutdown = "SSH client disconnect"
truth_source = "pty_process_and_machine_heartbeat"
required_observers = ["managed_sessions_snapshot", "machine_heartbeat", "timeline_sse", "browser_card", "hosted_db"]
metrics = ["terminal_detached_to_card_state_ms", "process_gone_to_card_state_ms"]
notes = "Must distinguish terminal relationship loss from provider process death and machine offline."

[[cases]]
id = "managed_codex_provider_kill"
status = "experimental"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "honest-degradation"
profile_class = "honest_degradation"
profiler_driver = "managed_codex_provider_kill"
ci_mode = "blocked"
blocked_reason = "Requires a hostile-process harness with provider child PID capture."
launch = "longhouse codex attached TUI"
shutdown = "SIGKILL provider child"
truth_source = "codex_bridge_and_process_scan"
required_observers = ["managed_sessions_snapshot", "timeline_sse", "browser_card", "hosted_db"]
metrics = ["process_gone_to_card_state_ms"]
notes = "Validates hard process-gone cleanup without pretending it is graceful."

