schema_version = 1
owner = "Longhouse"
description = "Session propagation SLA matrix for managed and unmanaged provider paths."

[statuses]
required = "Must stay passing once implemented; eligible for CI or release gating."
experimental = "Measured and reported, but not yet a hard gate."
undefined = "Product contract is intentionally not promised yet."

[[metrics]]
id = "warm_session_created_to_card_paint_ms"
profile_class = "warm_realtime"
layer = "browser_card"
target_ms = 500
hard_alarm_ms = 1000
description = "Warm timeline card paint after a newly launched session is known locally."

[[metrics]]
id = "cold_timeline_navigation_to_card_paint_ms"
profile_class = "cold_timeline"
layer = "browser_card"
target_ms = 2000
hard_alarm_ms = 4000
description = "Fresh timeline page navigation to target session card paint after truth already exists."

[[metrics]]
id = "cold_timeline_navigation_to_close_paint_ms"
profile_class = "cold_timeline"
layer = "browser_card"
target_ms = 2000
hard_alarm_ms = 4000
description = "Fresh timeline page navigation to closed-state card paint after managed shutdown truth already exists."

[[metrics]]
id = "warm_live_output_local_to_paint_ms"
profile_class = "warm_realtime"
layer = "browser_card"
target_ms = 500
hard_alarm_ms = 1000
legacy_aliases = ["live_first_from_local_ms"]
description = "Warm browser paint after provider/local live-output truth is observed."

[[metrics]]
id = "warm_live_output_sse_to_paint_ms"
profile_class = "warm_realtime"
layer = "browser_card"
target_ms = 100
hard_alarm_ms = 250
description = "Browser reaction time after timeline SSE delivered the live-output update."

[[metrics]]
id = "warm_close_local_to_sse_ms"
profile_class = "warm_realtime"
layer = "timeline_sse"
diagnostic = true
target_ms = 500
hard_alarm_ms = 1000
description = "Diagnostic latency for the profiler's dedicated close SSE watcher after local managed shutdown truth is observed. This is not the user-visible close SLA."

[[metrics]]
id = "warm_close_local_to_paint_ms"
profile_class = "warm_realtime"
layer = "browser_card"
target_ms = 1000
hard_alarm_ms = 2000
legacy_aliases = ["close_observed_ms"]
description = "Warm browser paint after local managed shutdown truth is observed."

[[metrics]]
id = "warm_close_sse_to_paint_ms"
profile_class = "warm_realtime"
layer = "browser_card"
diagnostic = true
target_ms = 100
hard_alarm_ms = 250
description = "Diagnostic ordering between the profiler close SSE watcher and browser paint. The browser can paint first from its own timeline stream."

[[metrics]]
id = "warm_close_local_to_db_ms"
profile_class = "warm_realtime"
layer = "hosted_db"
target_ms = 500
hard_alarm_ms = 1000
description = "Runtime Host state update after local managed shutdown truth is observed."

[[metrics]]
id = "durable_archive_local_to_hosted_ms"
profile_class = "durable_archive"
layer = "hosted_db"
target_ms = 3000
hard_alarm_ms = 30000
description = "Canonical hosted transcript/archive durability after local provider transcript append."

[[metrics]]
id = "terminal_detached_to_card_state_ms"
profile_class = "honest_degradation"
layer = "browser_card"
target_ms = 10000
hard_alarm_ms = 30000
description = "Card state update after terminal relationship loss is observed."

[[metrics]]
id = "process_gone_to_card_state_ms"
profile_class = "honest_degradation"
layer = "browser_card"
target_ms = 10000
hard_alarm_ms = 120000
description = "Card state update after process disappearance is proven by a complete local snapshot."

[[cases]]
id = "managed_codex_warm_live_graceful_close"
status = "required"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "warm-live"
profile_class = "warm_realtime"
profiler_driver = "managed_codex_warm_live"
ci_mode = "gate"
launch = "longhouse codex --no-attach"
shutdown = "longhouse-engine codex-bridge stop"
truth_source = "codex_bridge"
required_observers = ["managed_sessions_snapshot", "timeline_sse", "browser_card", "hosted_db"]
metrics = [
  "warm_session_created_to_card_paint_ms",
  "warm_live_output_local_to_paint_ms",
  "warm_live_output_sse_to_paint_ms",
  "warm_close_local_to_paint_ms",
  "warm_close_local_to_db_ms",
]
notes = "Current optimized happy path for already-open timeline realtime truth. Close is gated on browser-card paint and Runtime Host state, not the profiler's diagnostic close-SSE watcher. Durable archive is tracked as a separate case."

[[cases]]
id = "managed_codex_cold_timeline_closed"
status = "experimental"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "cold-timeline"
profile_class = "cold_timeline"
profiler_driver = "managed_codex_cold_timeline"
ci_mode = "report"
launch = "longhouse codex --no-attach"
shutdown = "longhouse-engine codex-bridge stop before fresh browser navigation"
truth_source = "hosted_runtime_state"
required_observers = ["browser_card", "hosted_db"]
metrics = [
  "cold_timeline_navigation_to_card_paint_ms",
  "cold_timeline_navigation_to_close_paint_ms",
]
notes = "Fresh page-load truth after a managed Codex session has already closed. This is not the realtime already-open page SLA."

[[cases]]
id = "managed_codex_durable_archive"
status = "experimental"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "warm-live"
profile_class = "durable_archive"
profiler_driver = "managed_codex_warm_live"
ci_mode = "report"
launch = "longhouse codex --no-attach"
shutdown = "longhouse-engine codex-bridge stop"
truth_source = "provider_transcript"
required_observers = ["provider_transcript", "managed_sessions_snapshot", "hosted_db"]
metrics = ["durable_archive_local_to_hosted_ms"]
notes = "Canonical hosted transcript/archive durability for the same managed Codex happy path, scored separately from warm realtime UI truth. Keep experimental until prepare-path variance and provider preconditions are boring."

[[cases]]
id = "managed_claude_warm_live_graceful_close"
status = "experimental"
provider = "claude"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "warm-live"
profile_class = "warm_realtime"
profiler_driver = "managed_claude_channel"
ci_mode = "blocked"
blocked_reason = "Needs a deterministic non-interactive Claude channel process driver plus explicit auth/cost controls."
launch = "longhouse claude"
shutdown = "provider-supported Claude exit path"
truth_source = "claude_native_channel"
required_observers = ["managed_sessions_snapshot", "claude_channel_state", "timeline_sse", "browser_card", "hosted_db"]
metrics = [
  "warm_session_created_to_card_paint_ms",
  "warm_live_output_local_to_paint_ms",
  "warm_close_local_to_paint_ms",
  "warm_close_local_to_db_ms",
  "durable_archive_local_to_hosted_ms",
]
notes = "Needs a real channel-backed process profile; do not borrow Codex bridge assumptions."

[[cases]]
id = "managed_opencode_warm_lifecycle"
status = "experimental"
provider = "opencode"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "warm-close"
profile_class = "warm_realtime"
profiler_driver = "managed_opencode_lifecycle"
ci_mode = "blocked"
blocked_reason = "Needs a deterministic OpenCode lifecycle profiler driver and explicit observer coverage before this can be scored."
launch = "longhouse opencode"
shutdown = "provider-supported OpenCode exit path"
truth_source = "managed_process_scan"
required_observers = ["managed_sessions_snapshot", "timeline_sse", "browser_card", "hosted_db"]
metrics = ["warm_session_created_to_card_paint_ms", "warm_close_local_to_paint_ms"]
notes = "Native OpenCode launch/send/interrupt/terminate exists; this SLA case stays blocked until profiler coverage can measure lifecycle propagation honestly."

[[cases]]
id = "unmanaged_codex_direct_graceful_close"
status = "experimental"
provider = "codex"
control_path = "unmanaged"
topology = "hosted_runtime_host"
profile = "baseline"
profile_class = "durable_archive"
profiler_driver = "unmanaged_codex_baseline"
ci_mode = "report"
launch = "codex exec"
shutdown = "provider process exits"
truth_source = "provider_transcript_and_process_scan"
required_observers = ["unmanaged_session_bindings", "timeline_api", "hosted_db"]
metrics = ["durable_archive_local_to_hosted_ms", "process_gone_to_card_state_ms"]
notes = "Compatibility/import path. It should be truthful, but not terminal-class realtime."

[[cases]]
id = "unmanaged_claude_direct_graceful_close"
status = "experimental"
provider = "claude"
control_path = "unmanaged"
topology = "hosted_runtime_host"
profile = "baseline"
profile_class = "durable_archive"
profiler_driver = "unmanaged_claude_baseline"
ci_mode = "blocked"
blocked_reason = "Needs a safe non-interactive Claude direct-run driver before real CI execution."
launch = "claude"
shutdown = "provider process exits"
truth_source = "provider_transcript_and_process_scan"
required_observers = ["unmanaged_session_bindings", "timeline_api", "hosted_db"]
metrics = ["durable_archive_local_to_hosted_ms", "process_gone_to_card_state_ms"]
notes = "Compatibility/import path. It should be truthful, but not terminal-class realtime."

[[cases]]
id = "managed_codex_ctrl_c"
status = "experimental"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "honest-degradation"
profile_class = "honest_degradation"
profiler_driver = "managed_codex_pty_ctrl_c"
ci_mode = "blocked"
blocked_reason = "Requires a real PTY harness; do not emulate Ctrl-C with a plain subprocess signal."
launch = "longhouse codex attached TUI"
shutdown = "Ctrl-C through PTY"
truth_source = "pty_and_codex_bridge"
required_observers = ["managed_sessions_snapshot", "timeline_sse", "browser_card", "hosted_db"]
metrics = ["warm_close_local_to_paint_ms", "terminal_detached_to_card_state_ms"]
notes = "Requires a real PTY. Ctrl-C can interrupt a turn or close a process depending on provider state."

[[cases]]
id = "managed_codex_graceful_close_during_active_turn"
status = "experimental"
provider = "codex"
control_path = "managed"
topology = "hosted_runtime_host"
profile = "warm-close"
profile_class = "warm_realtime"
profiler_driver = "managed_codex_active_turn_close"
ci_mode = "blocked"
blocked_reason = "Needs an active-turn driver that can prove provider state before invoking graceful bridge stop."
launch = "longhouse codex attached TUI"
