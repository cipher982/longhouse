services:
  longhouse-david:
    image: ${LONGHOUSE_IMAGE:-ghcr.io/cipher982/longhouse-runtime:latest}
    container_name: longhouse-david
    restart: unless-stopped
    env_file:
      - ./david.env
    volumes:
      - /var/lib/docker/data/longhouse/david:/data
    networks:
      - coolify
    # Allow container to reach host services via Tailscale (SSH bastion for cube/clifford)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - caddy=david.longhouse.ai
      - caddy.reverse_proxy={{upstreams 8000}}

networks:
  coolify:
    external: true
