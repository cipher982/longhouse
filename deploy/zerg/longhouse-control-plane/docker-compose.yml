services:
  longhouse-control-plane:
    image: ${LONGHOUSE_CONTROL_PLANE_IMAGE:-jkkcgcoo8wws0csocs40sokc:df61d247abd0af30a0e01b5504a90f38e745b2c9}
    container_name: longhouse-control-plane
    restart: unless-stopped
    command: uvicorn control_plane.main:app --host 0.0.0.0 --port 8085
    expose:
      - "8085"
    env_file:
      - path: app.env
        required: false
    labels:
      caddy: control.longhouse.ai
      caddy.reverse_proxy: "{{upstreams 8085}}"
      caddy_ingress_network: coolify
    networks:
      coolify:
        aliases:
          - longhouse-control-plane
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/app-data/longhouse-control-plane:/data
      - /var/app-data/longhouse:/var/app-data/longhouse

networks:
  coolify:
    external: true
    name: coolify
    attachable: true
