services:
  longhouse-demo:
    image: ${LONGHOUSE_DEMO_IMAGE:-ghcr.io/cipher982/longhouse-runtime:2be2bd2b97382af987b96f55d8a75500b057db84}
    container_name: longhouse-demo
    restart: unless-stopped
    entrypoint:
      - /entrypoint.sh
    command: sh -lc "/app/.venv/bin/python -m zerg.cli.main serve --host 0.0.0.0 --port $${LONGHOUSE_RUNTIME_PORT:-8000}"
    expose:
      - "8000"
    environment:
      LONGHOUSE_RUNTIME_PORT: "8000"
    env_file:
      - path: app.env
        required: false
    labels:
      caddy_0: https://longhouse.ai
      caddy_0.encode: zstd gzip
      caddy_0.handle_path: "/*"
      caddy_0.handle_path.0_reverse_proxy: "{{upstreams 8000}}"
      caddy_0.header: "-Server"
      caddy_0.try_files: "{path} /index.html /index.php"
      caddy_ingress_network: coolify
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s -X GET -f http://localhost:8000/api/health > /dev/null || wget -q -O- http://localhost:8000/api/health > /dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      coolify:
        aliases:
          - longhouse-demo

networks:
  coolify:
    external: true
    name: coolify
    attachable: true
