# Pre-commit configuration for Longhouse (codename: Zerg)
#
# Philosophy: Fast, comprehensive guardrails for AI agents
# - Tier 1 (pre-commit): < 15s, catches type errors and format issues
# - Tier 2 (make validate): < 30s, full contract validation
# - Tier 3 (CI): Full test suite
#
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # =========================================================================
  # Generic file hygiene (fast, universal)
  # =========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1500]
        exclude: ^server/zerg/vendor/tiktoken/(9b5ad71b2ce5302211f9c61530b329a4922fc6a4|fb374d419588a4632f3f557e76b4b70aebbca790)$
      - id: check-merge-conflict

  # =========================================================================
  # Secret scanning: catches AWS keys, JWTs, OpenAI/Anthropic keys, GH tokens.
  # If a real new secret-shape lands and gitleaks fires, fix the source. For
  # legitimate test fixtures, add `gitleaks:allow` on the line or extend
  # `[allowlist]` in `.gitleaks.toml` (do not loosen detection rules).
  # =========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.1
    hooks:
      - id: gitleaks

  # =========================================================================
  # Python: ruff for lint + format (fast, replaces black/isort/flake8)
  # Only targets main source code, not alembic migrations or test scripts
  # =========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --config=server/pyproject.toml]
        files: ^server/zerg/
        exclude: ^server/zerg/generated/
      - id: ruff-format
        args: [--config=server/pyproject.toml]
        files: ^server/zerg/
        exclude: ^server/zerg/generated/

  # =========================================================================
  # Local hooks for project-specific checks
  # =========================================================================
  - repo: local
    hooks:
      # -----------------------------------------------------------------------
      # Session-mode vocabulary must have one canonical definition
      # -----------------------------------------------------------------------
      - id: session-mode-definitions
        name: Session mode definition check
        entry: python3 scripts/ci/check-session-mode-definitions.py
        language: system
        files: \.md$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # TypeScript type checking (catches most AI errors)
      # -----------------------------------------------------------------------
      - id: typescript-typecheck
        name: TypeScript type check
        entry: bash -c 'cd web && bun run validate:types'
        language: system
        files: ^web/src/.*\.(ts|tsx)$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # Frontend lint (ESLint) - warn only, don't block on existing warnings
      # -----------------------------------------------------------------------
      - id: frontend-lint
        name: Frontend lint
        entry: bash -c 'cd web && bun run lint --max-warnings 100'
        language: system
        files: ^web/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # WebSocket contract drift guard
      # -----------------------------------------------------------------------
      - id: ws-contract-drift
        name: WebSocket contract drift check
        entry: make validate-ws
        language: system
        files: ^(schemas/ws-protocol.*|server/zerg/generated/ws_messages\.py|web/src/generated/ws-messages\.ts)$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # SSE contract drift guard
      # -----------------------------------------------------------------------
      - id: sse-contract-drift
        name: SSE contract drift check
        entry: make validate-sse
        language: system
        files: ^(schemas/sse-events\.asyncapi\.yml|server/zerg/generated/sse_events\.py|web/src/generated/sse-events\.ts)$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # iOS OpenAPI DTO drift guard
      # -----------------------------------------------------------------------
      - id: ios-api-contract-drift
        name: iOS OpenAPI DTO drift check
        entry: make validate-ios-api
        language: system
        files: ^(openapi\.json|scripts/generate/ios_api_models\.py|ios/Sources/Shared/Generated/SessionAPI\.generated\.swift)$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # AsyncAPI spec validation
      # -----------------------------------------------------------------------
      - id: asyncapi-validate
        name: AsyncAPI spec validation
        entry: scripts/qa/validate-asyncapi.sh
        language: system
        files: ^schemas/ws-protocol-asyncapi\.yml$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # CSS rgba alpha validation (catches recolor script bugs)
      # Alpha values >1 are clamped to 1.0, making colors fully opaque
      # -----------------------------------------------------------------------
      - id: css-rgba-validate
        name: CSS rgba alpha validation
        entry: scripts/qa/validate-rgba.sh
        language: system
        files: \.css$
        pass_filenames: false

      # -----------------------------------------------------------------------
      # Warn on new db.commit() in routers (prefer WriteSerializer)
      # -----------------------------------------------------------------------
      - id: check-db-commits
        name: Check db.commit() in routers
        entry: scripts/check-db-commits.sh
        language: system
        files: ^server/zerg/routers/.*\.py$
        pass_filenames: false
        verbose: true

      # -----------------------------------------------------------------------
      # Vulture dead code detection (unused functions/classes/variables)
      # -----------------------------------------------------------------------
      - id: python-vulture
        name: Vulture - detect dead code
        entry: bash -c 'cd server && uv run --extra dev vulture zerg/ vulture-whitelist.py --min-confidence 80 --exclude "**/tests/**,**/test_*.py,**/events/emitter_protocol.py,**/events/null_emitter.py"'
        language: system
        files: ^server/zerg/
        exclude: ^server/zerg/generated/
        pass_filenames: false
