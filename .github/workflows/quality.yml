name: Web Quality

on:
  push:
    paths:
      - 'web/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/quality.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/quality.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('quality-manual-{0}', github.run_id) || (github.event_name == 'pull_request' && format('quality-pr-{0}', github.event.pull_request.number)) || format('quality-branch-{0}', github.ref_name) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    name: "🏗️ Build frontend once"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: cd web && bun run build

      - name: Upload built frontend
        uses: actions/upload-artifact@v7
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist
          retention-days: 3

  lighthouse:
    runs-on: ubuntu-latest
    name: "🔦 Lighthouse CI"
    needs: build-frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Download built frontend
        uses: actions/download-artifact@v8
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
        working-directory: web

  bundle-size:
    runs-on: ubuntu-latest
    name: "📦 Bundle Size"
    needs: build-frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Download built frontend
        uses: actions/download-artifact@v8
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist

      - name: Check bundle size
        run: cd web && node ./scripts/check-bundle-size.mjs

  image-size:
    runs-on: ubuntu-latest
    name: "🖼️ Image Size Check"

    steps:
      - uses: actions/checkout@v6

      - name: Check for oversized images (>2MB)
        run: |
          MAX_BYTES=2097152  # 2MB in bytes
          FOUND_OVERSIZED=0

          echo "Checking images in web/public..."

          while IFS= read -r -d '' file; do
            size_bytes=$(stat -c%s "$file")
            size_kb=$((size_bytes / 1024))

            if [ "$size_bytes" -gt "$MAX_BYTES" ]; then
              size_mb=$(awk "BEGIN {printf \"%.2f\", $size_bytes/1048576}")
              echo "❌ $file: ${size_mb}MB (max: 2MB)"
              FOUND_OVERSIZED=1
            fi
          done < <(find web/public -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.webp" -o -name "*.gif" \) -print0)

          if [ "$FOUND_OVERSIZED" -eq 1 ]; then
            echo ""
            echo "🚨 Found oversized images! Compress them before merging."
            exit 1
          fi

          echo "✅ All images under 2MB"
