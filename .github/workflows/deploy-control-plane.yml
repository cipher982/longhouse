name: Deploy Control Plane

on:
  push:
    branches: [main]
    paths:
      - 'control-plane/**'
      - 'scripts/ops/coolify-deploy.sh'
      - 'scripts/ops/check-cp-credentials.sh'
      - '.github/workflows/deploy-control-plane.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-control-plane
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy Control Plane"
    runs-on: cube-deploy
    timeout-minutes: 20

    env:
      PUBLIC_DEMO_URL: https://longhouse.ai
      CONTROL_PLANE_URL: https://control.longhouse.ai
      CP_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: david010
      ZERG_HOST: 100.120.197.80
      ZERG_USER: zerg

    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.ZERG_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H clifford >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<SSHEOF
          Host zerg
            HostName 100.120.197.80
            User zerg
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          Host clifford
            HostName clifford
            User drose
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          SSHEOF

      - name: Make deploy helpers executable
        run: |
          chmod +x scripts/ops/coolify-deploy.sh
          chmod +x scripts/ops/check-cp-credentials.sh
          chmod +x scripts/qa/smoke-prod.sh

      - name: Deploy control plane
        run: ./scripts/ops/coolify-deploy.sh longhouse-control-plane --timeout 900

      - name: Wait for control plane health
        run: |
          check_health() {
            local url="$1"
            local name="$2"
            local max=30
            for i in $(seq 1 "$max"); do
              if curl -sf --max-time 5 "$url" > /dev/null 2>&1; then
                echo "✓ $name is up (attempt $i)"
                return 0
              fi
              echo "  $name not ready (attempt $i/$max)..."
              sleep 5
            done
            echo "✗ $name did not become healthy"
            return 1
          }

          check_health "$CONTROL_PLANE_URL/health" "Control plane"

      - name: Run smoke tests
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: ./scripts/qa/smoke-prod.sh --no-llm

      - name: Check control-plane credentials
        run: ./scripts/ops/check-cp-credentials.sh

      - name: Summary
        if: always()
        run: |
          echo "## Control Plane Deploy Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Control plane:** $CONTROL_PLANE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Hosted canary:** https://$INSTANCE_SUBDOMAIN.longhouse.ai" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
