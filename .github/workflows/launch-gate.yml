name: Launch Gate

on:
  push:
    tags-ignore:
      - 'v*'
    paths:
      - '.github/workflows/launch-gate.yml'
      - '.github/workflows/local-runtime-release.yml'
      - '.github/workflows/test-install.yml'
      - '.github/workflows/runner-onboarding-validation.yml'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/connect.py'
      - 'server/zerg/cli/codex.py'
      - 'server/zerg/cli/doctor.py'
      - 'server/zerg/cli/onboard.py'
      - 'server/zerg/cli/serve.py'
      - 'server/zerg/services/local_runtime_installer.py'
      - 'server/zerg/services/runtime_artifacts.py'
      - 'e2e/**'
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/ci/runtime-artifact-smoke.py'
      - 'scripts/qa/qa-oss.sh'
      - 'scripts/ops/run-onboarding-funnel.sh'
      - 'Makefile'
      - 'README.md'
  release:
    types: [published]
  pull_request:
    paths:
      - '.github/workflows/launch-gate.yml'
      - '.github/workflows/local-runtime-release.yml'
      - '.github/workflows/test-install.yml'
      - '.github/workflows/runner-onboarding-validation.yml'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/connect.py'
      - 'server/zerg/cli/codex.py'
      - 'server/zerg/cli/doctor.py'
      - 'server/zerg/cli/onboard.py'
      - 'server/zerg/cli/serve.py'
      - 'server/zerg/services/local_runtime_installer.py'
      - 'server/zerg/services/runtime_artifacts.py'
      - 'e2e/**'
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/ci/runtime-artifact-smoke.py'
      - 'scripts/qa/qa-oss.sh'
      - 'scripts/ops/run-onboarding-funnel.sh'
      - 'Makefile'
      - 'README.md'
  schedule:
    - cron: '23 9 * * *'
  workflow_dispatch: {}

jobs:
  installer-first-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "launch-gate--install--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Wait for released runtime artifacts
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          deadline=$((SECONDS + 900))
          required_assets=("local-runtime-checksums.txt")
          case "$MATRIX_OS" in
            macos-latest)
              required_assets+=(
                "longhouse-engine-darwin-arm64"
                "Longhouse-macos-arm64.zip"
              )
              ;;
            ubuntu-latest)
              required_assets+=(
                "longhouse-engine-linux-x64"
              )
              ;;
          esac

          while (( SECONDS < deadline )); do
            assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
            missing=""

            for asset in "${required_assets[@]}"; do
              if ! grep -Fx "$asset" <<<"$assets" >/dev/null; then
                missing="$asset"
                break
              fi
            done

            if [[ -z "$missing" ]]; then
              echo "Release assets are available for $RELEASE_TAG."
              exit 0
            fi

            echo "Waiting for release asset on $RELEASE_TAG: $missing"
            sleep 15
          done

          echo "Timed out waiting for release assets on $RELEASE_TAG." >&2
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' >&2
          exit 1

      - name: Wait for released CLI wheel on PyPI
        if: ${{ github.event_name == 'release' }}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          release_version="${RELEASE_TAG#v}"
          deadline=$((SECONDS + 900))

          while (( SECONDS < deadline )); do
            if python3 -c 'import json, sys, urllib.request; release_version = sys.argv[1]; payload = json.load(urllib.request.urlopen("https://pypi.org/pypi/longhouse/json", timeout=10)); raise SystemExit(0 if release_version in payload.get("releases", {}) and payload["releases"][release_version] else 1)' "$release_version"
            then
              echo "PyPI longhouse==$release_version is available."
              exit 0
            fi

            echo "Waiting for PyPI release longhouse==$release_version"
            sleep 15
          done

          echo "Timed out waiting for PyPI release longhouse==$release_version." >&2
          python3 -c 'import json, urllib.request; payload = json.load(urllib.request.urlopen("https://pypi.org/pypi/longhouse/json", timeout=10)); print("Latest PyPI versions:"); [print(version) for version in list(payload.get("releases", {}).keys())[-10:]]' >&2 || true
          exit 1

      - name: Run disposable installer smoke
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          args=(
            --shell "${{ matrix.shell_path }}"
            --installer-onboard
            --e2e-browser
          )
          if [[ "${{ github.event_name }}" == "release" ]]; then
            expected_commit="$(git rev-parse HEAD)"
            expected_version="${{ github.event.release.tag_name }}"
            expected_version="${expected_version#v}"
            args+=(--installer remote)
            args+=(--runtime-artifact-smoke)
            args+=(--expected-build-commit "$expected_commit")
            args+=(--expected-build-version "$expected_version")
          else
            args+=(--wheel)
          fi
          ./scripts/ci/installer-first-run.sh "${args[@]}"

      - name: Upload browser verification artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: installer-browser-verify-${{ matrix.os }}
          if-no-files-found: ignore
          path: /tmp/installer-browser-verify-failure.png

  onboarding-funnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "launch-gate--onboarding-funnel"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Verify make available
        run: command -v make

      - name: Install Playwright browsers
        run: |
          cd e2e
          bun install --silent
          bunx playwright install --with-deps chromium

      - name: Run launch gate locally
        run: make launch-gate-local

      - name: Upload onboarding artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: launch-gate-onboarding-artifacts
          if-no-files-found: ignore
          path: |
            /tmp/longhouse-onboarding/e2e/test-results
            /tmp/longhouse-onboarding/e2e/playwright-report
