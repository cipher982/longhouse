name: Launch Gate

on:
  push:
    paths:
      - '.github/workflows/launch-gate.yml'
      - '.github/workflows/test-install.yml'
      - '.github/workflows/runner-onboarding-validation.yml'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/connect.py'
      - 'server/zerg/cli/doctor.py'
      - 'server/zerg/cli/onboard.py'
      - 'server/zerg/cli/serve.py'
      - 'e2e/**'
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/qa-oss.sh'
      - 'scripts/ops/run-onboarding-funnel.sh'
      - 'Makefile'
      - 'README.md'
  pull_request:
    paths:
      - '.github/workflows/launch-gate.yml'
      - '.github/workflows/test-install.yml'
      - '.github/workflows/runner-onboarding-validation.yml'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/connect.py'
      - 'server/zerg/cli/doctor.py'
      - 'server/zerg/cli/onboard.py'
      - 'server/zerg/cli/serve.py'
      - 'e2e/**'
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/qa-oss.sh'
      - 'scripts/ops/run-onboarding-funnel.sh'
      - 'Makefile'
      - 'README.md'
  schedule:
    - cron: '23 9 * * *'
  workflow_dispatch: {}

jobs:
  installer-first-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "launch-gate--install--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Run disposable installer smoke (with browser verification)
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          ./scripts/ci/installer-first-run.sh --shell "${{ matrix.shell_path }}" --e2e-browser

      - name: Upload browser verification artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: installer-browser-verify-${{ matrix.os }}
          if-no-files-found: ignore
          path: /tmp/installer-browser-verify-failure.png

  onboarding-funnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "launch-gate--onboarding-funnel"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install Playwright browsers
        run: |
          cd e2e
          bun install --silent
          bunx playwright install --with-deps chromium

      - name: Run launch gate locally
        run: make launch-gate-local

      - name: Upload onboarding artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: launch-gate-onboarding-artifacts
          if-no-files-found: ignore
          path: |
            /tmp/longhouse-onboarding/e2e/test-results
            /tmp/longhouse-onboarding/e2e/playwright-report
