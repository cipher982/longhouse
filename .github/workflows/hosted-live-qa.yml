name: Hosted Live QA

on:
  schedule:
    - cron: '41 10 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  hosted-live-qa:
    name: "hosted-live-qa"
    runs-on: cube-deploy
    if: github.repository == 'cipher982/longhouse'
    timeout-minutes: 25
    env:
      CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
      QA_INSTANCE_SUBDOMAIN: ${{ vars.HOSTED_CANARY_SUBDOMAIN || 'demo' }}
      QA_HOME: /tmp/hosted-live-qa-${{ github.run_id }}-${{ github.run_attempt }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
      - uses: actions/checkout@v6

      - name: Restore Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            longhouse-bun-${{ runner.os }}-

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            longhouse-playwright-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Ensure make available
        run: ./scripts/ci/ensure-make.sh

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers + deps
        run: cd e2e && bunx playwright install --with-deps chromium

      - name: Prepare isolated QA home
        run: mkdir -p "$QA_HOME" "$PLAYWRIGHT_BROWSERS_PATH"

      - name: Run hosted live QA
        id: qa_live
        env:
          HOME: ${{ env.QA_HOME }}
        run: |
          attempts=0
          until make qa-live; do
            attempts=$((attempts + 1))
            if [[ "$attempts" -ge 2 ]]; then
              exit 1
            fi
            echo "qa-live failed; retrying once after 5s..." >&2
            sleep 5
          done

      - name: Run render-canary SLA check
        id: render_canary
        if: always() && steps.qa_live.outcome == 'success'
        env:
          HOME: ${{ env.QA_HOME }}
          LONGHOUSE_CANARY_TOKEN: ${{ secrets.LONGHOUSE_CANARY_TOKEN }}
        run: |
          if [[ -z "$LONGHOUSE_CANARY_TOKEN" ]]; then
            echo "LONGHOUSE_CANARY_TOKEN secret not set; skipping render-canary." >&2
            exit 0
          fi
          make render-canary

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Hosted Live QA"
            echo ""
            echo "- Instance: \`$QA_INSTANCE_SUBDOMAIN\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- qa-live: \`${{ steps.qa_live.outcome || 'skipped' }}\`"
            echo "- render-canary: \`${{ steps.render_canary.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live QA artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hosted-live-qa-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/qa-live-fail-*.png
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14
