name: Hosted Live QA

on:
  workflow_run:
    workflows: ["Deploy and Verify"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '41 10 * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch') && format('hosted-live-qa-manual-{0}', github.event_name == 'workflow_dispatch' && github.run_id || github.event.workflow_run.id) || format('hosted-live-qa-{0}', github.event.workflow_run.head_branch || github.ref_name) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.event.workflow_run.event != 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  hosted-live-qa:
    name: "hosted-live-qa"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
      QA_INSTANCE_SUBDOMAIN: david010
      QA_HOME: /tmp/hosted-live-qa-${{ github.run_id }}-${{ github.run_attempt }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Check if commit is superseded
        id: freshness
        uses: actions/github-script@v8
        with:
          script: |
            if (
              context.eventName === 'workflow_dispatch' ||
              context.payload.workflow_run?.event === 'workflow_dispatch'
            ) {
              core.setOutput('stale', 'false');
              return;
            }

            const targetSha = context.eventName === 'workflow_run'
              ? context.payload.workflow_run?.head_sha
              : context.sha;
            const { data } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
            });
            const stale = data.object.sha !== targetSha;
            core.info(`Latest main SHA=${data.object.sha}; target SHA=${targetSha}; stale=${stale}`);
            core.setOutput('stale', stale ? 'true' : 'false');
          result-encoding: string

      - name: Restore Bun download cache
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: hosted-live-qa-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            hosted-live-qa-bun-${{ runner.os }}-

      - name: Restore Playwright browser cache
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: hosted-live-qa-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            hosted-live-qa-playwright-${{ runner.os }}-

      - name: Set up Python
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install JS deps
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers + deps
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        run: cd e2e && bunx playwright install --with-deps chromium

      - name: Prepare isolated QA home
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        run: mkdir -p "$QA_HOME" "$PLAYWRIGHT_BROWSERS_PATH"

      - name: Run hosted live QA
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        id: qa_live
        env:
          HOME: ${{ env.QA_HOME }}
        run: |
          attempts=0
          until make qa-live; do
            attempts=$((attempts + 1))
            if [[ "$attempts" -ge 2 ]]; then
              exit 1
            fi
            echo "qa-live failed; retrying once after 5s..." >&2
            sleep 5
          done

      - name: Run hosted chat QA
        if: ${{ steps.freshness.outputs.stale != 'true' }}
        id: qa_live_chat
        env:
          HOME: ${{ env.QA_HOME }}
        run: |
          attempts=0
          until make qa-live-chat; do
            attempts=$((attempts + 1))
            if [[ "$attempts" -ge 2 ]]; then
              exit 1
            fi
            echo "qa-live-chat failed; retrying once after 5s..." >&2
            sleep 5
          done

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Hosted Live QA"
            echo ""
            echo "- Instance: \`$QA_INSTANCE_SUBDOMAIN\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}\`"
            echo "- Skipped as stale: \`${{ steps.freshness.outputs.stale || 'false' }}\`"
            echo "- qa-live: \`${{ steps.qa_live.outcome || 'skipped' }}\`"
            echo "- qa-live-chat: \`${{ steps.qa_live_chat.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live QA artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hosted-live-qa-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/qa-live-fail-*.png
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14
