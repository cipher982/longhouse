name: CI

on:
  push:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # Self-hosted runners can have global pip config pointing at private indexes.
  # Force public PyPI for CI so setup-python's pip step doesn't fail.
  PIP_INDEX_URL: https://pypi.org/simple
  PIP_EXTRA_INDEX_URL: ""

jobs:
  # -----------------------------------------------------------------------
  # Path detection — skip jobs whose code hasn't changed
  # Skipped jobs don't block workflow success.
  # -----------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    name: "Changed paths"
    outputs:
      backend:        ${{ steps.filter.outputs.backend }}
      frontend:       ${{ steps.filter.outputs.frontend }}
      engine:         ${{ steps.filter.outputs.engine }}
      schemas:        ${{ steps.filter.outputs.schemas }}
      packaging:      ${{ steps.filter.outputs.packaging }}
      runner:         ${{ steps.filter.outputs.runner }}
      ios:            ${{ steps.filter.outputs.ios }}
      e2e:            ${{ steps.filter.outputs.e2e }}
      models:         ${{ steps.filter.outputs.models }}
      scripts:        ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/path-filters.yml

  validate:
    needs: changes
    if: ${{ (needs.changes.outputs.schemas == 'true' || needs.changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: cube
    name: "Validation"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Ensure make available
      run: ./scripts/ci/ensure-make.sh

    - name: Validate
      run: make validate

  backend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "Backend tests"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Ensure make available
      run: ./scripts/ci/ensure-make.sh

    - name: Run Python Backend Tests
      run: make test

    - name: Run Install-Runner Tests
      run: make test-install-runner

    - name: Run Hosted-Instance Helper Tests
      run: make test-hosted-instance

    - name: Run Web Runtime Entrypoint Tests
      run: make test-web-entrypoint

    - name: Run iOS simulator helper tests
      run: make test-ios-helper

  engine-tests:
    needs: changes
    if: ${{ needs.changes.outputs.engine == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "Engine tests"
    env:
      CARGO_PROFILE: ci

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Cache Rust build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
        key: engine-ci-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml') }}
        restore-keys: |
          engine-ci-${{ runner.os }}-

    - name: Ensure make available
      run: ./scripts/ci/ensure-make.sh

    - name: Run Rust Engine Tests (unit + golden + adversarial)
      run: make test-engine

    - name: Run Shipper Pipeline E2E (fixture → engine ship → API → DB)
      run: make test-shipper-e2e

  frontend-tests:
    needs: changes
    if: ${{ (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.runner == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: cube
    name: "Frontend + runner tests"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Ensure make available
      run: ./scripts/ci/ensure-make.sh

    - name: Run Frontend Tests
      run: make test-frontend

    - name: Run Runner Unit Tests
      run: make test-runner

  ios-tests:
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    timeout-minutes: 25
    name: "iOS tests"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Restore Swift package cache
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/org.swift.swiftpm
          ~/Library/Developer/Xcode/DerivedData/LonghouseIOS-*/SourcePackages
        key: longhouse-ios-spm-${{ runner.os }}-${{ hashFiles('ios/Package.swift', 'ios/XcodeHarness/project.yml') }}
        restore-keys: |
          longhouse-ios-spm-${{ runner.os }}-

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Stage build identity for iOS bundle
      run: |
        python3 scripts/build/generate_build_identity.py
        bash scripts/build/stage_ios_build_identity.sh

    - name: Generate Xcode project
      run: xcodegen --spec ios/XcodeHarness/project.yml --project-root ios/XcodeHarness

    - name: Select simulator destination
      id: simulator
      run: |
        DESTINATION="$(python3 scripts/ci/select_ios_simulator.py ios/XcodeHarness/LonghouseIOS.xcodeproj Longhouse)"
        echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"

    - name: Run iOS tests
      run: |
        IOS_DERIVED_DATA_PATH="$RUNNER_TEMP/LonghouseIOSDerivedData" \
        IOS_RESULTS_DIR="$RUNNER_TEMP/ios-test-results" \
        IOS_TEST_SCHEMES="Longhouse LonghouseChatStress" \
        ./scripts/ci/run_ios_tests.sh "${{ steps.simulator.outputs.destination }}"

    - name: Upload iOS test results
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: ios-xcresult
        if-no-files-found: ignore
        path: ${{ runner.temp }}/ios-test-results

  wheel-package:
    needs: changes
    if: ${{ needs.changes.outputs.packaging == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "CLI wheel packaging"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Ensure make available
      run: ./scripts/ci/ensure-make.sh

    - name: Verify CLI wheel packaging
      run: make test-wheel-package

  e2e:
    needs: changes
    if: ${{ (needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: cube
    name: "End-to-end tests"
    env:
      # E2E tests use per-backend SQLite databases (no Postgres needed)
      FERNET_SECRET: ${{ secrets.FERNET_SECRET }}
      # Life Hub credentials for session continuity tests
      LIFE_HUB_API_KEY: ${{ secrets.LIFE_HUB_API_KEY }}
      LIFE_HUB_URL: https://data.drose.io
      # Isolate E2E DBs per run to avoid cross-run contamination on shared runners
      E2E_DB_DIR: /tmp/zerg_e2e_dbs/${{ github.run_id }}-${{ github.run_attempt }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Restore Playwright browser cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
        restore-keys: |
          longhouse-playwright-${{ runner.os }}-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Ensure make available
      run: ./scripts/ci/ensure-make.sh

    - name: Install Playwright browsers + deps
      run: cd e2e && bunx playwright install --with-deps chromium

    - name: Pre-install backend deps
      run: cd server && uv sync

    - name: Run E2E Tests (core + a11y)
      run: make test-e2e

    - name: Upload E2E artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-artifacts
        path: |
          e2e/test-results
          e2e/playwright-report

  model-smoke:
    needs: changes
    if: ${{ needs.changes.outputs.models == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "Model smoke tests"
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Smoke test all models
      run: uv run --with openai --with anthropic python scripts/qa/smoke_models.py --ci

  oss-qa:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "OSS onboarding smoke"
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Restore Playwright browser cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
        restore-keys: |
          longhouse-playwright-${{ runner.os }}-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Install Playwright
      run: cd e2e && bun install && bunx playwright install chromium

    - name: Run OSS QA (no unit/e2e, UI check only)
      env:
        ONBOARDING_PLAYWRIGHT_PROJECT: onboarding-chromium
      run: ./scripts/qa/qa-oss.sh --no-unit --no-e2e
