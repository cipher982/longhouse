name: push-pr-ci--validate-contracts-and-lints--unit-backend-frontend-runner--e2e-core-a11y

on:
  push:
  pull_request:
  workflow_dispatch: {}

run-name: push-pr-ci--${{ github.ref_name }}--${{ github.sha }}

permissions:
  contents: read

env:
  # Self-hosted runners can have global pip config pointing at private indexes.
  # Force public PyPI for CI so setup-python's pip step doesn't fail.
  PIP_INDEX_URL: https://pypi.org/simple
  PIP_EXTRA_INDEX_URL: ""

jobs:
  # -----------------------------------------------------------------------
  # Path detection — skip jobs whose code hasn't changed
  # Skipped jobs don't block workflow success.
  # -----------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    name: "🔀 detect-changed-paths"
    outputs:
      backend:        ${{ steps.filter.outputs.backend }}
      frontend:       ${{ steps.filter.outputs.frontend }}
      engine:         ${{ steps.filter.outputs.engine }}
      schemas:        ${{ steps.filter.outputs.schemas }}
      control_plane:  ${{ steps.filter.outputs.control_plane }}
      packaging:      ${{ steps.filter.outputs.packaging }}
      runner:         ${{ steps.filter.outputs.runner }}
      e2e:            ${{ steps.filter.outputs.e2e }}
      models:         ${{ steps.filter.outputs.models }}
      scripts:        ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'server/**'
              - 'config/**'
            frontend:
              - 'web/**'
              - 'bun.lock'
              - 'package.json'
            engine:
              - 'engine/**'
            schemas:
              - 'schemas/**'
              - 'scripts/generate/**'
              - 'Makefile'
            control_plane:
              - 'control-plane/**'
            packaging:
              - 'server/pyproject.toml'
              - 'server/setup.cfg'
              - 'web/**'
              - 'scripts/qa/test-wheel-package.sh'
            runner:
              - 'runner/**'
            e2e:
              - 'e2e/**'
              - 'server/**'
              - 'web/**'
              - 'config/**'
            models:
              - 'config/models.json'
              - 'server/zerg/llm/**'
              - 'scripts/qa/smoke_models.py'
            scripts:
              - 'scripts/**'

  validate:
    needs: changes
    if: ${{ (needs.changes.outputs.schemas == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: cube-fast
    name: "🔍 validate--make-validate--ws-sse-sdk-makefile-lints"

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Verify make available
      run: command -v make

    - name: Validate
      run: make validate

  sqlite-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.engine == 'true' || needs.changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "🗃️ sqlite-lite--make-test--install-runner--oss-path"
    env:
      CARGO_PROFILE: ci

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Cache Rust build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          engine/target
        key: engine-ci-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock', 'engine/Cargo.toml') }}
        restore-keys: |
          engine-ci-${{ runner.os }}-

    - name: Verify make available
      run: command -v make

    - name: Run Python Backend Tests
      run: make test

    - name: Run Rust Engine Tests (unit + golden + adversarial)
      run: make test-engine

    - name: Run Shipper Pipeline E2E (fixture → engine ship → API → DB)
      run: make test-shipper-e2e

    - name: Run Install-Runner Tests
      run: make test-install-runner

    - name: Run Hosted-Instance Helper Tests
      run: make test-hosted-instance

    - name: Run Web Runtime Entrypoint Tests
      run: make test-web-entrypoint

  frontend-tests:
    needs: changes
    if: ${{ (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.runner == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: cube-fast
    name: "⚛️ unit-frontend--bun-validate-types--bun-test--make-test-runner-unit"

    steps:
    - uses: actions/checkout@v6

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Verify make available
      run: command -v make

    - name: Run Frontend Tests
      run: make test-frontend

    - name: Run Runner Unit Tests
      run: make test-runner

  wheel-package:
    needs: changes
    if: ${{ needs.changes.outputs.packaging == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "📦 wheel-package--build-verify"

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Verify make available
      run: command -v make

    - name: Verify CLI wheel packaging
      run: make test-wheel-package

  e2e:
    needs: changes
    if: ${{ (needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: cube-browser
    name: "🎭 e2e-core-a11y--make-test-e2e"
    env:
      # E2E tests use per-backend SQLite databases (no Postgres needed)
      FERNET_SECRET: ${{ secrets.FERNET_SECRET }}
      # Life Hub credentials for session continuity tests
      LIFE_HUB_API_KEY: ${{ secrets.LIFE_HUB_API_KEY }}
      LIFE_HUB_URL: https://data.drose.io
      # Isolate E2E DBs per run to avoid cross-run contamination on shared runners
      E2E_DB_DIR: /tmp/zerg_e2e_dbs/${{ github.run_id }}-${{ github.run_attempt }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
    - uses: actions/checkout@v6

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Restore Playwright browser cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
        restore-keys: |
          longhouse-playwright-${{ runner.os }}-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Verify make available
      run: command -v make

    - name: Install Playwright browsers + deps
      run: cd e2e && bunx playwright install --with-deps chromium

    - name: Pre-install backend deps
      run: cd server && uv sync

    - name: Run E2E Tests (core + a11y)
      run: make test-e2e

    - name: Upload E2E artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-artifacts
        path: |
          e2e/test-results
          e2e/playwright-report

  control-plane-e2e:
    needs: changes
    if: ${{ needs.changes.outputs.control_plane == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "🎭 control-plane-e2e--signup-login-gates"
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright-py

    steps:
    - uses: actions/checkout@v6

    - name: Restore Playwright browser cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: longhouse-playwright-py-${{ runner.os }}-${{ hashFiles('control-plane/uv.lock') }}
        restore-keys: |
          longhouse-playwright-py-${{ runner.os }}-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Verify make available
      run: command -v make

    - name: Install control plane deps
      run: cd control-plane && uv sync --extra dev --frozen

    - name: Install Playwright browsers
      run: cd control-plane && uv run --extra dev playwright install chromium --with-deps

    - name: Run control plane E2E tests
      run: make test-e2e-cp

  model-smoke:
    needs: changes
    if: ${{ needs.changes.outputs.models == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "🔥 model-smoke--ping-all-models-json"
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Smoke test all models
      run: uv run --with openai --with anthropic python scripts/qa/smoke_models.py --ci

  oss-qa:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "📦 oss-qa--fresh-clone--sqlite--onboarding-ui"
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
    - uses: actions/checkout@v6

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Restore Playwright browser cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
        restore-keys: |
          longhouse-playwright-${{ runner.os }}-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Install Playwright
      run: cd e2e && bun install && bunx playwright install chromium

    - name: Run OSS QA (no unit/e2e, UI check only)
      env:
        ONBOARDING_PLAYWRIGHT_PROJECT: onboarding-chromium
      run: ./scripts/qa/qa-oss.sh --no-unit --no-e2e
