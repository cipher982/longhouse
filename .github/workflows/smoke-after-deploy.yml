name: Smoke Test After Deploy

on:
  schedule:
    # Run every 6 hours to catch issues between deploys
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      skip_wait:
        description: 'Skip waiting for deploy (run immediately)'
        required: false
        default: 'false'
        type: boolean

# Never cancel runs
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  smoke:
    name: "🧪 Product Smoke Test"
    runs-on: cube-deploy
    timeout-minutes: 10
    if: ${{ github.repository == 'cipher982/longhouse' && (github.event_name != 'schedule' || vars.SMOKE_AFTER_DEPLOY_ENABLED != 'false') }}
    env:
      PUBLIC_DEMO_URL: https://longhouse.ai
      CONTROL_PLANE_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: ${{ vars.HOSTED_CANARY_SUBDOMAIN || 'demo' }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve hosted instance
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          chmod +x scripts/ci/export-hosted-instance-env.sh
          ./scripts/ci/export-hosted-instance-env.sh

      - name: Health check (quick)
        run: |
          ./scripts/ci/wait-for-http.sh "$API_URL/api/health" "API" 10 10
          ./scripts/ci/wait-for-http.sh "$FRONTEND_URL" "Frontend" 10 10

      - name: Run smoke tests
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          chmod +x scripts/qa/smoke-prod.sh
          ./scripts/qa/smoke-prod.sh

      - name: Summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** $INSTANCE_SUBDOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** $FRONTEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Public demo:** $PUBLIC_DEMO_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Email routing audit:** runs as a separate non-blocking job" >> $GITHUB_STEP_SUMMARY

  email-routing-audit:
    name: "📬 Email Routing Audit"
    runs-on: cube-deploy
    timeout-minutes: 5
    continue-on-error: true
    if: ${{ github.repository == 'cipher982/longhouse' && (github.event_name != 'schedule' || vars.SMOKE_AFTER_DEPLOY_ENABLED != 'false') }}
    env:
      PUBLIC_DEMO_URL: https://longhouse.ai

    steps:
      - uses: actions/checkout@v6

      - name: Check email routing (mailto → Cloudflare forward rules)
        id: email_routing
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
        run: |
          chmod +x scripts/ops/check-email-routing.sh
          ./scripts/ops/check-email-routing.sh

      - name: Summary
        if: always()
        run: |
          echo "## Email Routing Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** $PUBLIC_DEMO_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.email_routing.outcome }}" >> $GITHUB_STEP_SUMMARY
