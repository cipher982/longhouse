name: Smoke Test After Deploy

on:
  schedule:
    # Run every 6 hours to catch issues between deploys
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      skip_wait:
        description: 'Skip waiting for deploy (run immediately)'
        required: false
        default: 'false'
        type: boolean

# Never cancel runs
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  smoke:
    name: "🧪 Post-Deploy Smoke Test"
    runs-on: cube
    timeout-minutes: 10
    if: ${{ github.event_name != 'schedule' || vars.SMOKE_AFTER_DEPLOY_ENABLED != 'false' }}
    env:
      MARKETING_URL: https://longhouse.ai
      CONTROL_PLANE_URL: https://control.longhouse.ai
      CP_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: david010

    steps:
      - uses: actions/checkout@v4

      - name: Resolve hosted instance
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          chmod +x scripts/ci/export-hosted-instance-env.sh
          ./scripts/ci/export-hosted-instance-env.sh

      - name: Health check (quick)
        run: |
          check_health() {
            local url="$1"
            local name="$2"
            local max=10
            for i in $(seq 1 "$max"); do
              if curl -sf "$url" > /dev/null; then
                echo "✓ $name is healthy (attempt $i)"
                return 0
              fi
              echo "Attempt $i/$max: $name not ready, waiting 10s..."
              sleep 10
            done
            echo "✗ $name did not become healthy"
            return 1
          }

          check_health "$API_URL/api/health" "API"
          check_health "$FRONTEND_URL" "Frontend"

      - name: Run smoke tests
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          chmod +x scripts/smoke-prod.sh
          ./scripts/smoke-prod.sh

      - name: Check control plane credentials
        env:
          STRIPE_SECRET_KEY: ${{ secrets.CONTROL_PLANE_STRIPE_SECRET_KEY }}
          CONTROL_PLANE_INSTANCE_AWS_SES_ACCESS_KEY_ID: ${{ secrets.CONTROL_PLANE_SES_ACCESS_KEY_ID }}
          CONTROL_PLANE_INSTANCE_AWS_SES_SECRET_ACCESS_KEY: ${{ secrets.CONTROL_PLANE_SES_SECRET_KEY }}
          CONTROL_PLANE_INSTANCE_AWS_SES_REGION: us-east-1
        run: |
          chmod +x scripts/check-cp-credentials.sh
          ./scripts/check-cp-credentials.sh

      - name: Check email routing (mailto → Cloudflare forward rules)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          chmod +x scripts/check-email-routing.sh
          ./scripts/check-email-routing.sh

      - name: Summary
        if: always()
        run: |
          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** $INSTANCE_SUBDOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** $FRONTEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
