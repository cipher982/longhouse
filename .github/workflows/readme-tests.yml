name: README Tests

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "packages/*/README.md"
      - "apps/*/README.md"
      - "scripts/run-readme-tests.py"
  schedule:
    # Nightly at 6am UTC — catches silent drift even without README changes
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode (smoke or full)"
        default: "smoke"
        required: false

jobs:
  readme-smoke:
    name: README smoke tests
    runs-on: cube-fast
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Run readme-test blocks
        run: make test-readmes MODE=${{ github.event.inputs.mode || 'smoke' }}
