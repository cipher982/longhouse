name: Continuation Provider Smoke

on:
  workflow_dispatch: {}
  schedule:
    - cron: '17 09 * * *'

concurrency:
  group: continuation-provider-smoke
  cancel-in-progress: false

permissions:
  contents: read

env:
  FERNET_SECRET: ${{ secrets.FERNET_SECRET }}
  LIFE_HUB_API_KEY: ${{ secrets.LIFE_HUB_API_KEY }}
  LIFE_HUB_URL: https://data.drose.io
  E2E_DB_DIR: /tmp/zerg_e2e_dbs/${{ github.run_id }}-${{ github.run_attempt }}
  PLAYWRIGHT_WORKERS: '1'
  E2E_FAKE_SESSION_CHAT: '0'
  SESSION_CHAT_BACKEND: anthropic
  SESSION_CHAT_MODEL: claude-sonnet-4-20250514
  ANTHROPIC_API_KEY: ${{ secrets.LONGHOUSE_CI_ANTHROPIC_API_KEY }}
  PROVIDER_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}/continuation-provider-smoke

jobs:
  continuation-provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Install JS deps (repo root)
        run: bun install --frozen-lockfile

      - name: Pre-install backend deps
        run: cd apps/zerg/backend && uv sync

      - name: Install Playwright browsers + deps
        run: cd apps/zerg/e2e && bunx playwright install --with-deps chromium

      - name: Run provider-backed continuation smoke
        run: make test-e2e-continuation-provider

      - name: Write smoke summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path(os.environ['PROVIDER_SMOKE_ARTIFACT_DIR']) / 'manifest.json'
          summary_path = Path(os.environ['GITHUB_STEP_SUMMARY'])

          lines = ['## Continuation Provider Smoke', '']
          if not manifest_path.exists():
              lines.append('- No manifest was produced.')
              summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
              raise SystemExit(0)

          data = json.loads(manifest_path.read_text(encoding='utf-8'))
          lines.append(f"- Status: **{data.get('status', 'unknown')}**")
          for label, key in [
              ('Backend', 'backend'),
              ('Model', 'model'),
              ('Root session', 'root_session_id'),
              ('Child session', 'child_session_id'),
              ('Head session', 'head_session_id'),
              ('Continuation count', 'continuation_count'),
              ('Final URL', 'final_url'),
          ]:
              value = data.get(key)
              if value is not None:
                  lines.append(f"- {label}: `{value}`")
          error = data.get('error')
          if error:
              lines.append(f"- Error: `{error}`")
          summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Upload smoke proof manifest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: continuation-provider-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.PROVIDER_SMOKE_ARTIFACT_DIR }}/manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload smoke debug bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: continuation-provider-smoke-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.PROVIDER_SMOKE_ARTIFACT_DIR }}
          if-no-files-found: ignore
          retention-days: 14
