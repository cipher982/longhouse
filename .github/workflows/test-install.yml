name: Installer Validation Ring

on:
  push:
    tags-ignore:
      - 'v*'
    paths:
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/test-cli-upgrade.sh'
      - 'scripts/qa/test-local-runtime-packaging.sh'
      - 'scripts/resolve-swift-product-path.sh'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/**'
      - 'server/zerg/__main__.py'
      - 'desktop/LonghouseMenuBarHarness/**'
      - 'engine/**'
      - 'runner/**'
      - 'swift/**'
      - '.github/workflows/test-install.yml'
  pull_request:
    paths:
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/test-cli-upgrade.sh'
      - 'scripts/qa/test-local-runtime-packaging.sh'
      - 'scripts/resolve-swift-product-path.sh'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/**'
      - 'server/zerg/__main__.py'
      - 'desktop/LonghouseMenuBarHarness/**'
      - 'engine/**'
      - 'runner/**'
      - 'swift/**'
      - '.github/workflows/test-install.yml'
  schedule:
    - cron: '11 9 * * *'
  workflow_dispatch:
    inputs:
      run_public_canary:
        description: 'Also run the published installer canary against the default branch'
        required: false
        default: false
        type: boolean

jobs:
  managed-codex-smoke-binary:
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    # macOS hosted Rust builds for managed Codex run materially slower than Ubuntu.
    # Revisit with deeper build caching post-launch; keep the audit path reliable now.
    timeout-minutes: 75
    name: "managed-codex-smoke-build--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore managed Codex cargo dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: managed-codex-cargo-${{ runner.os }}-${{ hashFiles('scripts/release/build-managed-codex.sh', 'scripts/release/managed-codex.patch') }}
          restore-keys: |
            managed-codex-cargo-${{ runner.os }}-

      - name: Install Linux build deps for managed Codex
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libcap-dev

      - name: Build managed Codex binary for smoke reuse
        run: |
          mkdir -p prebuilt
          chmod +x scripts/release/build-managed-codex.sh
          scripts/release/build-managed-codex.sh --output prebuilt/longhouse-codex
          chmod +x prebuilt/longhouse-codex

      - name: Upload managed Codex smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-smoke-managed-codex-${{ matrix.os }}
          path: prebuilt/longhouse-codex
          retention-days: 1

  runtime-packaging-macos:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: macos-latest
    timeout-minutes: 20
    name: "runtime-packaging--macos-latest"

    steps:
      - uses: actions/checkout@v6

      - name: Run canonical macOS app packaging smoke
        run: make test-runtime-packaging-macos

      - name: Upload packaging artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: runtime-packaging-macos
          if-no-files-found: ignore
          path: artifacts/runtime-packaging

  installer-first-run-local:
    needs: managed-codex-smoke-binary
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
            menubar_smoke: '0'
          - os: macos-latest
            shell_path: /bin/zsh
            menubar_smoke: '1'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "installer-happy-path--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install Linux build deps for managed Codex
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libcap-dev

      - name: Download prebuilt managed Codex
        uses: actions/download-artifact@v5
        with:
          name: installer-smoke-managed-codex-${{ matrix.os }}
          path: ${{ runner.temp }}/managed-codex

      - name: Run disposable installer smoke
        env:
          INSTALLER_TEST_MENUBAR: ${{ matrix.menubar_smoke }}
        run: |
          export LONGHOUSE_CODEX_SOURCE="${RUNNER_TEMP}/managed-codex/longhouse-codex"
          chmod +x "$LONGHOUSE_CODEX_SOURCE"
          chmod +x scripts/ci/installer-first-run.sh
          ./scripts/ci/installer-first-run.sh --shell "${{ matrix.shell_path }}"

  installer-first-run-remote:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_public_canary) }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "installer-public-canary--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run public installer smoke
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          chmod +x scripts/ci/check-public-installer-sync.sh
          ./scripts/ci/installer-first-run.sh \
            --installer remote \
            --shell "${{ matrix.shell_path }}" \
            --installer-onboard \
            --runtime-artifact-smoke

  installer-upgrade-local:
    needs: managed-codex-smoke-binary
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    name: "installer-upgrade--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install Linux build deps for managed Codex
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libcap-dev

      - name: Download prebuilt managed Codex
        uses: actions/download-artifact@v5
        with:
          name: installer-smoke-managed-codex-${{ matrix.os }}
          path: ${{ runner.temp }}/managed-codex

      - name: Rehearse install -> upgrade in disposable HOME
        run: |
          export LONGHOUSE_CODEX_SOURCE="${RUNNER_TEMP}/managed-codex/longhouse-codex"
          chmod +x "$LONGHOUSE_CODEX_SOURCE"
          chmod +x scripts/qa/test-cli-upgrade.sh
          ./scripts/qa/test-cli-upgrade.sh --shell "${{ matrix.shell_path }}"
