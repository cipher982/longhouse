name: Installer Validation Ring

on:
  push:
  pull_request:
  schedule:
    - cron: '11 9 * * *'
  workflow_dispatch: {}

jobs:
  installer-first-run-local:
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: ubuntu-22.04
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
          - os: macos-15
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "installer-first-run--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Run disposable installer smoke
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          ./scripts/ci/installer-first-run.sh --shell "${{ matrix.shell_path }}"

  installer-first-run-remote:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "installer-public-canary--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run public installer smoke
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          ./scripts/ci/installer-first-run.sh --installer remote --shell "${{ matrix.shell_path }}"
