name: Installer Validation Ring

on:
  push:
    tags-ignore:
      - 'v*'
    paths:
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/test-cli-upgrade.sh'
      - 'scripts/qa/test-local-runtime-packaging.sh'
      - 'scripts/resolve-swift-product-path.sh'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/**'
      - 'server/zerg/__main__.py'
      - 'desktop/LonghouseMenuBarHarness/**'
      - 'engine/**'
      - 'runner/**'
      - 'swift/**'
      - '.github/workflows/test-install.yml'
  pull_request:
    paths:
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/test-cli-upgrade.sh'
      - 'scripts/qa/test-local-runtime-packaging.sh'
      - 'scripts/resolve-swift-product-path.sh'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/**'
      - 'server/zerg/__main__.py'
      - 'desktop/LonghouseMenuBarHarness/**'
      - 'engine/**'
      - 'runner/**'
      - 'swift/**'
      - '.github/workflows/test-install.yml'
  schedule:
    - cron: '11 9 * * *'
  workflow_dispatch:
    inputs:
      run_public_canary:
        description: 'Also run the published installer canary against the default branch'
        required: false
        default: false
        type: boolean

jobs:
  runtime-packaging-macos:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: macos-latest
    timeout-minutes: 20
    name: "runtime-packaging--macos-latest"

    steps:
      - uses: actions/checkout@v6

      - name: Run canonical macOS app packaging smoke
        run: make test-runtime-packaging-macos

      - name: Upload packaging artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: runtime-packaging-macos
          if-no-files-found: ignore
          path: artifacts/runtime-packaging

  installer-first-run-local:
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
            menubar_smoke: '0'
          - os: macos-latest
            shell_path: /bin/zsh
            menubar_smoke: '1'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "installer-happy-path--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Run disposable installer smoke
        env:
          INSTALLER_TEST_MENUBAR: ${{ matrix.menubar_smoke }}
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          ./scripts/ci/installer-first-run.sh --shell "${{ matrix.shell_path }}"

  installer-first-run-remote:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_public_canary) }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "installer-public-canary--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run public installer smoke
        run: |
          chmod +x scripts/ci/installer-first-run.sh
          chmod +x scripts/ci/check-public-installer-sync.sh
          release_json="$(gh release view --json tagName)"
          release_tag="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["tagName"])' <<< "$release_json")"
          expected_commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${release_tag}" --jq .sha)"
          expected_version="${release_tag#v}"
          ./scripts/ci/installer-first-run.sh \
            --installer remote \
            --shell "${{ matrix.shell_path }}" \
            --installer-onboard \
            --runtime-artifact-smoke \
            --expected-build-commit "$expected_commit" \
            --expected-build-version "$expected_version"

  installer-upgrade-local:
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell_path: /bin/bash
          - os: macos-latest
            shell_path: /bin/zsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    name: "installer-upgrade--${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Rehearse install -> upgrade in disposable HOME
        run: |
          chmod +x scripts/qa/test-cli-upgrade.sh
          ./scripts/qa/test-cli-upgrade.sh --shell "${{ matrix.shell_path }}"
