name: Local Runtime Binary Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to publish from (for example v0.1.6)"
        required: true
        type: string
      notary_wait_timeout:
        description: "How long to wait for Apple notarization before failing (for example 330m)"
        required: false
        default: "330m"
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-engine:
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            engine_asset: longhouse-engine-linux-x64
            codex_asset: longhouse-codex-linux-x64
          - os: ubuntu-24.04-arm
            engine_asset: longhouse-engine-linux-arm64
            codex_asset: longhouse-codex-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build engine binary
        run: cargo build --manifest-path engine/Cargo.toml --release --bin longhouse-engine

      - name: Build managed Codex binary
        run: |
          chmod +x scripts/release/build-managed-codex.sh
          scripts/release/build-managed-codex.sh --output "binaries/${{ matrix.codex_asset }}"

      - name: Collect engine binary
        run: |
          mkdir -p binaries
          cp engine/target/release/longhouse-engine "binaries/${{ matrix.engine_asset }}"
          chmod +x "binaries/${{ matrix.engine_asset }}"
          chmod +x "binaries/${{ matrix.codex_asset }}"

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v6
        with:
          name: runtime-${{ matrix.engine_asset }}
          path: |
            binaries/${{ matrix.engine_asset }}
            binaries/${{ matrix.codex_asset }}
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 360
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
      LONGHOUSE_NOTARY_WAIT_TIMEOUT: ${{ inputs.notary_wait_timeout || '330m' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Classify release tier
        id: release_tier
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          if [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tier=stable" >> "$GITHUB_OUTPUT"
          else
            echo "tier=smoke" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build engine binary
        run: cargo build --manifest-path engine/Cargo.toml --release --bin longhouse-engine

      - name: Collect engine binary
        run: |
          mkdir -p binaries
          cp engine/target/release/longhouse-engine binaries/longhouse-engine-darwin-arm64
          chmod +x binaries/longhouse-engine-darwin-arm64

      - name: Build managed Codex binary
        run: |
          chmod +x scripts/release/build-managed-codex.sh
          scripts/release/build-managed-codex.sh --output binaries/longhouse-codex-darwin-arm64

      - name: Build macOS ambient app payload
        run: |
          PRODUCT_PATH="$(scripts/resolve-swift-product-path.sh \
            --package-path desktop/LonghouseMenuBarHarness \
            --product LonghouseMenuBarHarnessMenuBar \
            --configuration release)"
          cp "$PRODUCT_PATH" "$RUNNER_TEMP/LonghouseMenuBarHarnessMenuBar"
          chmod +x "$RUNNER_TEMP/LonghouseMenuBarHarnessMenuBar"

      - name: Configure macOS signing keychain
        id: macos_signing
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TIER: ${{ steps.release_tier.outputs.tier }}
          MACOS_SIGNING_CERT_P12_BASE64: ${{ secrets.MACOS_SIGNING_CERT_P12_BASE64 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [[ -z "${MACOS_SIGNING_CERT_P12_BASE64:-}" || -z "${MACOS_SIGNING_CERT_PASSWORD:-}" || -z "${MACOS_SIGNING_IDENTITY:-}" ]]; then
            if [[ "${RELEASE_TIER}" == "stable" ]]; then
              echo "Stable macOS releases require Developer ID signing credentials." >&2
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "signing_mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "codesign_identity=-" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/longhouse-release-cert.p12"
          G2_CERT_PATH="$RUNNER_TEMP/DeveloperIDG2CA.cer"
          KEYCHAIN_PATH="$RUNNER_TEMP/longhouse-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 18)"

          printf '%s' "$MACOS_SIGNING_CERT_P12_BASE64" | base64 -D -o "$CERT_PATH"
          curl -fsSL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o "$G2_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security import "$G2_CERT_PATH" -k "$KEYCHAIN_PATH" -f x509 -t cert
          SEARCH_KEYCHAINS=(
            "$KEYCHAIN_PATH"
            "/System/Library/Keychains/SystemRootCertificates.keychain"
            "/Library/Keychains/System.keychain"
          )
          if [[ -f "$HOME/Library/Keychains/login.keychain-db" ]]; then
            SEARCH_KEYCHAINS+=("$HOME/Library/Keychains/login.keychain-db")
          fi
          security list-keychains -d user -s "${SEARCH_KEYCHAINS[@]}"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning | grep -F "$MACOS_SIGNING_IDENTITY" >/dev/null; then
            echo "Configured signing identity is not available in the signing keychain." >&2
            exit 1
          fi
          rm -f "$CERT_PATH" "$G2_CERT_PATH"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "signing_mode=developer-id" >> "$GITHUB_OUTPUT"
          echo "codesign_identity=$MACOS_SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Configure notarytool profile
        id: macos_notary
        env:
          RELEASE_TIER: ${{ steps.release_tier.outputs.tier }}
          SIGNING_ENABLED: ${{ steps.macos_signing.outputs.enabled }}
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
        run: |
          if [[ "${SIGNING_ENABLED}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${MACOS_NOTARY_APPLE_ID:-}" || -z "${MACOS_NOTARY_TEAM_ID:-}" || -z "${MACOS_NOTARY_APP_PASSWORD:-}" ]]; then
            if [[ "${RELEASE_TIER}" == "stable" ]]; then
              echo "Stable macOS releases require notarization credentials." >&2
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          xcrun notarytool store-credentials "longhouse-notary" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_APP_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "profile=longhouse-notary" >> "$GITHUB_OUTPUT"

      - name: Re-sign macOS runtime binaries for stable release
        if: ${{ steps.release_tier.outputs.tier == 'stable' && steps.macos_signing.outputs.enabled == 'true' }}
        env:
          CODESIGN_IDENTITY: ${{ steps.macos_signing.outputs.codesign_identity }}
        run: |
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            binaries/longhouse-engine-darwin-arm64
          codesign --verify --strict --verbose=2 binaries/longhouse-engine-darwin-arm64
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            binaries/longhouse-codex-darwin-arm64
          codesign --verify --strict --verbose=2 binaries/longhouse-codex-darwin-arm64

      - name: Package macOS desktop app bundle
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          APP_STAGE_DIR="$RUNNER_TEMP/macos-app-bundles"

          mkdir -p "$APP_STAGE_DIR"

          scripts/release/macos-package-app.sh \
            --binary "$RUNNER_TEMP/LonghouseMenuBarHarnessMenuBar" \
            --app-name Longhouse \
            --exec-name Longhouse \
            --bundle-id ai.longhouse.app \
            --version "$VERSION" \
            --short-version "$VERSION" \
            --output-dir "$APP_STAGE_DIR" \
            --icon-png web/public/favicon-512.png \
            --lsuielement true

      - name: Sign macOS desktop app bundle
        env:
          RELEASE_TIER: ${{ steps.release_tier.outputs.tier }}
          SIGNING_MODE: ${{ steps.macos_signing.outputs.signing_mode }}
          CODESIGN_IDENTITY: ${{ steps.macos_signing.outputs.codesign_identity }}
        run: |
          if [[ "$RELEASE_TIER" == "stable" && "$SIGNING_MODE" != "developer-id" ]]; then
            echo "Stable macOS releases require Developer ID signing mode." >&2
            exit 1
          fi

          scripts/release/macos-sign-app.sh \
            --app "$RUNNER_TEMP/macos-app-bundles/Longhouse.app" \
            --identity "$CODESIGN_IDENTITY" \
            --mode "$SIGNING_MODE"

      - name: Initialize macOS packaging manifest
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TIER: ${{ steps.release_tier.outputs.tier }}
          SIGNING_MODE: ${{ steps.macos_signing.outputs.signing_mode }}
          NOTARY_ENABLED: ${{ steps.macos_notary.outputs.enabled }}
          NOTARY_PROFILE: ${{ steps.macos_notary.outputs.profile }}
          LONGHOUSE_NOTARY_WAIT_TIMEOUT: ${{ env.LONGHOUSE_NOTARY_WAIT_TIMEOUT }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          AMBIENT_APP_PATH="$RUNNER_TEMP/macos-app-bundles/Longhouse.app"
          DESKTOP_RUNTIME_ARCHIVE="binaries/Longhouse-macos-arm64.zip"
          PUBLIC_DMG_ARCHIVE="binaries/Longhouse-macos-arm64.dmg"

          if [[ "$RELEASE_TIER" == "stable" && ( "$NOTARY_ENABLED" != "true" || -z "${NOTARY_PROFILE:-}" ) ]]; then
            echo "Stable macOS releases require notarization." >&2
            exit 1
          fi

          NOTARIZATION_STATUS="not-configured"
          PUBLIC_DOWNLOAD_NOTARIZATION_STATUS="not-configured"
          if [[ "$NOTARY_ENABLED" == "true" ]]; then
            NOTARIZATION_STATUS="awaiting-submission"
            PUBLIC_DOWNLOAD_NOTARIZATION_STATUS="awaiting-build"
          else
            ditto -c -k --sequesterRsrc --keepParent "$AMBIENT_APP_PATH" "$DESKTOP_RUNTIME_ARCHIVE"
          fi

          NOTARIZATION_STATUS="$NOTARIZATION_STATUS" \
          PUBLIC_DOWNLOAD_NOTARIZATION_STATUS="$PUBLIC_DOWNLOAD_NOTARIZATION_STATUS" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "schema_version": 3,
              "release_tag": os.environ["RELEASE_TAG"],
              "release_tier": os.environ["RELEASE_TIER"],
              "version": os.environ["RELEASE_TAG"].removeprefix("v"),
              "signing_mode": os.environ["SIGNING_MODE"],
              "notarization_status": os.environ["NOTARIZATION_STATUS"],
              "public_download_notarization_status": os.environ["PUBLIC_DOWNLOAD_NOTARIZATION_STATUS"],
              "notary_wait_timeout": os.environ["LONGHOUSE_NOTARY_WAIT_TIMEOUT"],
              "notarization_submission_id": None,
              "public_download_submission_id": None,
              "artifacts": [
                  {
                      "component": "desktop-app",
                      "bundle_id": "ai.longhouse.app",
                      "app_name": "Longhouse",
                      "app_archive": "Longhouse-macos-arm64.zip",
                      "disk_image": "Longhouse-macos-arm64.dmg",
                  }
              ],
          }
          Path("binaries/local-runtime-macos-packaging.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
        shell: bash

      - name: Submit macOS app for notarization
        if: ${{ steps.macos_notary.outputs.enabled == 'true' }}
        env:
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
          NOTARY_PROFILE: ${{ steps.macos_notary.outputs.profile }}
        run: |
          SUBMISSION_FILE="$RUNNER_TEMP/local-runtime-macos-notary-submission.txt"
          scripts/release/macos-notarize-app.sh \
            --app "$RUNNER_TEMP/macos-app-bundles/Longhouse.app" \
            --archive binaries/Longhouse-macos-arm64.zip \
            --keychain-profile "$NOTARY_PROFILE" \
            --keychain "$KEYCHAIN_PATH" \
            --submission-id-file "$SUBMISSION_FILE" \
            --submit-only

          SUBMISSION_ID="$(cat "$SUBMISSION_FILE")"
          SUBMISSION_ID="$SUBMISSION_ID" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload["notarization_status"] = "submitted"
          payload["notarization_submission_id"] = os.environ["SUBMISSION_ID"]
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Wait for Apple notarization and staple app
        if: ${{ steps.macos_notary.outputs.enabled == 'true' }}
        env:
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
          NOTARY_PROFILE: ${{ steps.macos_notary.outputs.profile }}
        run: |
          SUBMISSION_ID="$(cat "$RUNNER_TEMP/local-runtime-macos-notary-submission.txt")"
          scripts/release/macos-notarize-app.sh \
            --app "$RUNNER_TEMP/macos-app-bundles/Longhouse.app" \
            --archive binaries/Longhouse-macos-arm64.zip \
            --keychain-profile "$NOTARY_PROFILE" \
            --keychain "$KEYCHAIN_PATH" \
            --submission-id "$SUBMISSION_ID"

      - name: Mark macOS notarization complete
        if: ${{ success() && steps.macos_notary.outputs.enabled == 'true' }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload["notarization_status"] = "notarized"
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Mark macOS notarization pending
        if: ${{ failure() && steps.macos_notary.outputs.enabled == 'true' }}
        run: |
          if [[ ! -f binaries/local-runtime-macos-packaging.json ]]; then
            exit 0
          fi

          SUBMISSION_ID=""
          if [[ -f "$RUNNER_TEMP/local-runtime-macos-notary-submission.txt" ]]; then
            SUBMISSION_ID="$(cat "$RUNNER_TEMP/local-runtime-macos-notary-submission.txt")"
          fi

          SUBMISSION_ID="$SUBMISSION_ID" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload["notarization_status"] = "pending-apple"
          if os.environ["SUBMISSION_ID"]:
              payload["notarization_submission_id"] = os.environ["SUBMISSION_ID"]
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Build public macOS disk image
        env:
          SIGNING_MODE: ${{ steps.macos_signing.outputs.signing_mode }}
          CODESIGN_IDENTITY: ${{ steps.macos_signing.outputs.codesign_identity }}
        run: |
          PUBLIC_DMG_ARCHIVE="binaries/Longhouse-macos-arm64.dmg"

          scripts/release/macos-package-dmg.sh \
            --app "$RUNNER_TEMP/macos-app-bundles/Longhouse.app" \
            --output "$PUBLIC_DMG_ARCHIVE"

          scripts/release/macos-sign-disk-image.sh \
            --dmg "$PUBLIC_DMG_ARCHIVE" \
            --identity "$CODESIGN_IDENTITY" \
            --mode "$SIGNING_MODE"

          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          if payload.get("public_download_notarization_status") == "awaiting-build":
              payload["public_download_notarization_status"] = "awaiting-submission"
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Submit macOS disk image for notarization
        if: ${{ steps.macos_notary.outputs.enabled == 'true' }}
        env:
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
          NOTARY_PROFILE: ${{ steps.macos_notary.outputs.profile }}
        run: |
          SUBMISSION_FILE="$RUNNER_TEMP/local-runtime-macos-dmg-notary-submission.txt"
          scripts/release/macos-notarize-file.sh \
            --file binaries/Longhouse-macos-arm64.dmg \
            --keychain-profile "$NOTARY_PROFILE" \
            --keychain "$KEYCHAIN_PATH" \
            --submission-id-file "$SUBMISSION_FILE" \
            --submit-only

          SUBMISSION_ID="$(cat "$SUBMISSION_FILE")"
          SUBMISSION_ID="$SUBMISSION_ID" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload["public_download_notarization_status"] = "submitted"
          payload["public_download_submission_id"] = os.environ["SUBMISSION_ID"]
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Wait for Apple notarization and staple disk image
        if: ${{ steps.macos_notary.outputs.enabled == 'true' }}
        env:
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
          NOTARY_PROFILE: ${{ steps.macos_notary.outputs.profile }}
        run: |
          SUBMISSION_ID="$(cat "$RUNNER_TEMP/local-runtime-macos-dmg-notary-submission.txt")"
          scripts/release/macos-notarize-file.sh \
            --file binaries/Longhouse-macos-arm64.dmg \
            --keychain-profile "$NOTARY_PROFILE" \
            --keychain "$KEYCHAIN_PATH" \
            --submission-id "$SUBMISSION_ID" \
            --staple binaries/Longhouse-macos-arm64.dmg

      - name: Mark macOS disk image notarization complete
        if: ${{ success() && steps.macos_notary.outputs.enabled == 'true' }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload["public_download_notarization_status"] = "notarized"
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Mark macOS disk image notarization pending
        if: ${{ failure() && steps.macos_notary.outputs.enabled == 'true' }}
        run: |
          if [[ ! -f binaries/local-runtime-macos-packaging.json ]]; then
            exit 0
          fi

          SUBMISSION_ID=""
          if [[ -f "$RUNNER_TEMP/local-runtime-macos-dmg-notary-submission.txt" ]]; then
            SUBMISSION_ID="$(cat "$RUNNER_TEMP/local-runtime-macos-dmg-notary-submission.txt")"
          fi

          SUBMISSION_ID="$SUBMISSION_ID" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("binaries/local-runtime-macos-packaging.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload["public_download_notarization_status"] = "pending-apple"
          if os.environ["SUBMISSION_ID"]:
              payload["public_download_submission_id"] = os.environ["SUBMISSION_ID"]
          manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Remove temporary signing keychain
        if: ${{ always() && steps.macos_signing.outputs.enabled == 'true' }}
        env:
          KEYCHAIN_PATH: ${{ steps.macos_signing.outputs.keychain_path }}
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload runtime artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: runtime-macos
          if-no-files-found: ignore
          path: binaries/*
          retention-days: 7

  release:
    needs:
      - build-engine
      - build-macos
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Classify release tier
        id: release_tier
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          if [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tier=stable" >> "$GITHUB_OUTPUT"
          else
            echo "tier=smoke" >> "$GITHUB_OUTPUT"
          fi

      - name: Download runtime artifacts
        uses: actions/download-artifact@v5
        with:
          path: binaries
          merge-multiple: true

      - name: List runtime artifacts
        run: ls -la binaries

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > local-runtime-checksums.txt

      - name: Assert stable macOS trust metadata
        if: ${{ steps.release_tier.outputs.tier == 'stable' }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("binaries/local-runtime-macos-packaging.json").read_text())
          if payload.get("signing_mode") != "developer-id":
              raise SystemExit(f"Expected developer-id signing, got {payload.get('signing_mode')!r}")
          if payload.get("notarization_status") != "notarized":
              raise SystemExit(
                  f"Expected notarized macOS packaging, got {payload.get('notarization_status')!r}"
              )
          if payload.get("public_download_notarization_status") != "notarized":
              raise SystemExit(
                  "Expected notarized public macOS disk image, "
                  f"got {payload.get('public_download_notarization_status')!r}"
              )
          PY

      - name: Upload runtime assets to release
        run: gh release upload "$RELEASE_TAG" binaries/* --clobber --repo "${{ github.repository }}"

      - name: Attest runtime release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            binaries/longhouse-engine-darwin-arm64
            binaries/longhouse-engine-linux-x64
            binaries/longhouse-engine-linux-arm64
            binaries/longhouse-codex-darwin-arm64
            binaries/longhouse-codex-linux-x64
            binaries/longhouse-codex-linux-arm64
            binaries/Longhouse-macos-arm64.dmg
            binaries/Longhouse-macos-arm64.zip
            binaries/local-runtime-macos-packaging.json
            binaries/local-runtime-checksums.txt
