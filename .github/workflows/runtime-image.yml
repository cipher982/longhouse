name: Publish Runtime Image

on:
  push:
    branches: [main]
    tags:
      - "runtime-v*"
    paths:
      - ".dockerignore"
      - "bun.lock"
      - "server/**"
      - "web/**"
      - "engine/**"
      - "config/**"
      - "docker/entrypoint.sh"
      - "docker/runtime.dockerfile"
      - ".github/workflows/runtime-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/longhouse-runtime
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "$DEFAULT_BRANCH" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runtime.dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
