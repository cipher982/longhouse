name: Publish Runtime Image

on:
  push:
    branches: [main]
    tags:
      - "runtime-v*"
    paths:
      - '.dockerignore'
      - 'bun.lock'
      - 'config/**'
      - 'docker/entrypoint.sh'
      - 'docker/runtime.dockerfile'
      - 'engine/**'
      - 'server/**'
      - 'web/**'
      - '.github/workflows/runtime-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: "Detect runtime image scope"
    runs-on: ubuntu-latest
    outputs:
      runtime_image: ${{ steps.decide.outputs.runtime_image }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'push' }}
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@v4
        if: ${{ github.event_name == 'push' }}
        id: filter
        with:
          filters: .github/path-filters.yml
      - name: Resolve runtime image scope
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "runtime_image=${{ steps.filter.outputs.runtime_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_image=true" >> "$GITHUB_OUTPUT"
          fi

  gate:
    name: "Gate image on push to main"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.runtime_image == 'true' }}
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
    steps:
      - name: Resolve target commit
        id: meta
        run: |
          echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "Building image for ${{ github.sha }}"

  build-and-push:
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 1

      - name: Stage build identity for runtime image
        run: python3 scripts/build/generate_build_identity.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/longhouse-runtime
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${HEAD_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "$DEFAULT_BRANCH" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runtime.dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.gate.outputs.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
