name: Publish Runtime Image

on:
  push:
    branches: [main]
    tags:
      - "runtime-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  gate:
    name: "Gate image on push to main"
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
    steps:
      - name: Resolve target commit
        id: meta
        run: |
          echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "Building image for ${{ github.sha }}"

  build-and-push:
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/longhouse-runtime
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${HEAD_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runtime.dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.gate.outputs.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
