name: Publish Runtime Image

on:
  workflow_run:
    workflows: ["push-pr-ci--validate-contracts-and-lints--unit-backend-frontend-runner--e2e-core-a11y"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - "runtime-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('runtime-image-manual-{0}', github.run_id) || (github.ref_type == 'tag' && format('runtime-image-tag-{0}', github.ref_name)) || (github.event_name == 'workflow_run' && format('runtime-image-branch-{0}', github.event.workflow_run.head_branch)) || format('runtime-image-branch-{0}', github.ref_name) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_type != 'tag' }}

jobs:
  gate:
    name: "Gate image on CI success"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI gate passed — proceeding with image build"

  build-and-push:
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/longhouse-runtime
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "$DEFAULT_BRANCH" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runtime.dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
