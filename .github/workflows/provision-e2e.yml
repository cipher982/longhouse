name: Provisioning E2E

on:
  workflow_run:
    workflows: ["Publish Runtime Image"]
    types: [completed]
    branches:
      - main
  pull_request:
    paths:
      - '.dockerignore'
      - 'bun.lock'
      - 'control-plane/**'
      - 'server/**'
      - 'web/**'
      - 'config/**'
      - 'docker/entrypoint.sh'
      - 'docker/runtime.dockerfile'
      - 'scripts/ci/provision-e2e.sh'
      - 'scripts/lib/hosted-instance.sh'
      - '.github/workflows/provision-e2e.yml'
      - '.github/workflows/runtime-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  provision-e2e-core:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker gate
        run: |
          set -euo pipefail
          command -v docker
          docker info

      - name: Select runtime image
        id: runtime-image
        shell: bash
        run: |
          set -euo pipefail
          image=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/longhouse-runtime:${{ github.event.workflow_run.head_sha }}"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          if [[ -n "$image" ]]; then
            echo "Selected published runtime image: $image"
          else
            echo "Selected runtime image: build current checkout"
          fi

      - name: Provisioning E2E core gate (control plane + instance)
        env:
          PROVISION_E2E_RUNTIME_IMAGE: ${{ steps.runtime-image.outputs.image }}
          PROVISION_E2E_RUNTIME_PLATFORM: linux/amd64
        run: ./scripts/ci/provision-e2e.sh --mode core

  provision-e2e-extended:
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker gate
        run: |
          set -euo pipefail
          command -v docker
          docker info

      - name: Select runtime image
        id: runtime-image
        shell: bash
        run: |
          set -euo pipefail
          image=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/longhouse-runtime:${{ github.event.workflow_run.head_sha }}"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          if [[ -n "$image" ]]; then
            echo "Selected published runtime image: $image"
          else
            echo "Selected runtime image: build current checkout"
          fi

      - name: Provisioning E2E extended canary
        env:
          PROVISION_E2E_RUNTIME_IMAGE: ${{ steps.runtime-image.outputs.image }}
          PROVISION_E2E_RUNTIME_PLATFORM: linux/amd64
        run: ./scripts/ci/provision-e2e.sh --mode extended
