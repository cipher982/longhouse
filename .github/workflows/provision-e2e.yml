name: Provisioning E2E

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.dockerignore'
      - 'bun.lock'
      - 'control-plane/**'
      - 'server/**'
      - 'web/**'
      - 'config/**'
      - 'docker/entrypoint.sh'
      - 'docker/runtime.dockerfile'
      - 'scripts/ci/provision-e2e.sh'
      - 'scripts/lib/hosted-instance.sh'
      - '.github/workflows/provision-e2e.yml'
      - '.github/workflows/runtime-image.yml'
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  wait-for-image:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Wait for runtime image
        uses: ./.github/actions/wait-for-ci
        with:
          head_sha: ${{ github.sha }}
          head_branch: ${{ github.ref_name }}
          github_token: ${{ github.token }}
          workflow_id: runtime-image.yml
          event: push
          timeout_seconds: "600"

  provision-e2e-core:
    needs: [wait-for-image]
    if: ${{ always() && (needs.wait-for-image.result == 'success' || github.event_name != 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker gate
        run: |
          set -euo pipefail
          command -v docker
          docker info

      - name: Select runtime image
        id: runtime-image
        shell: bash
        run: |
          set -euo pipefail
          image=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/longhouse-runtime:${GITHUB_SHA}"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          if [[ -n "$image" ]]; then
            echo "Selected published runtime image: $image"
          else
            echo "Selected runtime image: build current checkout"
          fi

      - name: Provisioning E2E core gate (control plane + instance)
        env:
          PROVISION_E2E_RUNTIME_IMAGE: ${{ steps.runtime-image.outputs.image }}
          PROVISION_E2E_RUNTIME_PLATFORM: linux/amd64
        run: ./scripts/ci/provision-e2e.sh --mode core

  provision-e2e-extended:
    needs: [wait-for-image]
    if: ${{ always() && github.event_name != 'pull_request' && (needs.wait-for-image.result == 'success' || github.event_name != 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker gate
        run: |
          set -euo pipefail
          command -v docker
          docker info

      - name: Select runtime image
        id: runtime-image
        shell: bash
        run: |
          set -euo pipefail
          image=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/longhouse-runtime:${GITHUB_SHA}"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          if [[ -n "$image" ]]; then
            echo "Selected published runtime image: $image"
          else
            echo "Selected runtime image: build current checkout"
          fi

      - name: Provisioning E2E extended canary
        env:
          PROVISION_E2E_RUNTIME_IMAGE: ${{ steps.runtime-image.outputs.image }}
          PROVISION_E2E_RUNTIME_PLATFORM: linux/amd64
        run: ./scripts/ci/provision-e2e.sh --mode extended
