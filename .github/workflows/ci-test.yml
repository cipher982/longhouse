name: CI Test Runner

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or SHA) to test'
        required: true
        default: 'main'
        type: string
      suite:
        description: 'Test suite to run'
        required: true
        type: choice
        options:
          - validate
          - unit
          - frontend
          - runner
          - engine
          - e2e-core
          - e2e-a11y
          - e2e-single
          - full
          - codex-bridge-e2e
      test:
        description: 'Playwright test path for e2e-single (e.g. tests/core/sessions.spec.ts)'
        required: false
        type: string

env:
  FERNET_SECRET: ${{ secrets.FERNET_SECRET }}
  E2E_DB_DIR: /tmp/zerg_e2e_dbs/${{ github.run_id }}-${{ github.run_attempt }}
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  run:
    runs-on: cube
    name: "🧪 ci-test--${{ inputs.suite }}--${{ inputs.ref }}"
    env:
      SUITE: ${{ inputs.suite }}
      TEST: ${{ inputs.test }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Restore Bun download cache
        if: contains('frontend runner e2e-core e2e-a11y e2e-single full', inputs.suite)
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            longhouse-bun-${{ runner.os }}-

      - name: Restore Playwright browser cache
        if: startsWith(inputs.suite, 'e2e-') || inputs.suite == 'full'
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            longhouse-playwright-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Setup Rust
        if: contains(fromJSON('["engine","full","codex-bridge-e2e"]'), inputs.suite)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make build-essential pkg-config

      - name: Install JS deps (repo root)
        if: contains('frontend runner e2e-core e2e-a11y e2e-single full', inputs.suite)
        run: bun install --frozen-lockfile

      - name: Pre-install backend deps
        if: contains('validate unit e2e-core e2e-a11y e2e-single full codex-bridge-e2e', inputs.suite)
        run: cd server && uv sync

      - name: Install Playwright browsers + deps
        if: startsWith(inputs.suite, 'e2e-') || inputs.suite == 'full'
        run: cd e2e && bunx playwright install --with-deps chromium

      - name: Run selected suite
        run: |
          set -euo pipefail

          case "$SUITE" in
            validate)
              make validate
              ;;
            unit)
              make test
              ;;
            frontend)
              make test-frontend
              ;;
            runner)
              make test-runner
              ;;
            engine)
              make test-engine
              ;;
            e2e-core)
              make test-e2e-core
              ;;
            e2e-a11y)
              make test-e2e-a11y
              ;;
            e2e-single)
              if [ -z "${TEST}" ]; then
                echo "TEST is required for e2e-single (example: tests/core/sessions.spec.ts)" >&2
                exit 2
              fi
              if ! echo "${TEST}" | grep -Eq '^[A-Za-z0-9_./-]+$'; then
                echo "TEST has invalid characters" >&2
                exit 2
              fi
              make test-e2e-single TEST="${TEST}"
              ;;
            full)
              make test-full
              ;;
            codex-bridge-e2e)
              make install-engine
              make test-codex-bridge-e2e
              ;;
            *)
              echo "Unknown suite: ${SUITE}" >&2
              exit 2
              ;;
          esac

      - name: Upload E2E artifacts (on failure)
        if: failure() && (startsWith(inputs.suite, 'e2e-') || inputs.suite == 'full')
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-e2e-artifacts
          path: |
            e2e/test-results
            e2e/playwright-report
