name: Deploy and Verify

on:
  workflow_run:
    workflows: ["Publish Runtime Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-and-verify
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy + Smoke + Rollback"
    runs-on: cube-deploy
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      MARKETING_URL: https://longhouse.ai
      CONTROL_PLANE_URL: https://control.longhouse.ai
      CP_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: david010
      ZERG_HOST: 100.120.197.80
      ZERG_USER: zerg

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.ZERG_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H clifford >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<SSHEOF
          Host zerg
            HostName 100.120.197.80
            User zerg
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          Host clifford
            HostName clifford
            User drose
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          SSHEOF

      - name: Record previous image SHA
        id: prev
        run: |
          CONTAINER_NAME="longhouse-${INSTANCE_SUBDOMAIN}"
          FULL_SHA=$(ssh zerg "docker inspect $CONTAINER_NAME --format '{{index .Config.Labels \"org.opencontainers.image.revision\"}}'" 2>/dev/null || echo "")
          SHORT_SHA="${FULL_SHA:0:7}"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Previous image revision: ${SHORT_SHA:-unknown} (full: ${FULL_SHA:-unknown})"

      - name: Deploy Coolify apps (marketing + control plane)
        env:
          COOLIFY_DEMO_UUID: ${{ secrets.COOLIFY_DEMO_UUID }}
          COOLIFY_CP_UUID: ${{ secrets.COOLIFY_CP_UUID }}
        run: |
          if [[ -z "$COOLIFY_DEMO_UUID" || -z "$COOLIFY_CP_UUID" ]]; then
            echo "Skipping Coolify deploy — secrets not configured"
            exit 0
          fi
          ssh clifford "
            TOKEN=\$(sudo cat /var/lib/docker/data/coolify-api/token.env | cut -d= -f2) && \
            curl -sf -X POST \
              -H \"Authorization: Bearer \$TOKEN\" \
              -H 'Content-Type: application/json' \
              -d '{\"uuid\":\"$COOLIFY_DEMO_UUID\"}' \
              'http://localhost:8000/api/v1/deploy' && \
            curl -sf -X POST \
              -H \"Authorization: Bearer \$TOKEN\" \
              -H 'Content-Type: application/json' \
              -d '{\"uuid\":\"$COOLIFY_CP_UUID\"}' \
              'http://localhost:8000/api/v1/deploy'
          "

      - name: Wait for control plane and marketing
        run: |
          check_health() {
            local url="$1"
            local name="$2"
            local max=30
            for i in $(seq 1 "$max"); do
              if curl -sf --max-time 5 "$url" > /dev/null 2>&1; then
                echo "✓ $name is up (attempt $i)"
                return 0
              fi
              echo "  $name not ready (attempt $i/$max)..."
              sleep 5
            done
            echo "✗ $name did not become healthy"
            return 1
          }

          check_health "$CONTROL_PLANE_URL/health" "Control plane"
          check_health "$MARKETING_URL" "Marketing site"

      - name: Resolve hosted instance
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          chmod +x scripts/ci/export-hosted-instance-env.sh
          ./scripts/ci/export-hosted-instance-env.sh

      - name: Reprovision user instance
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          . scripts/lib/hosted-instance.sh
          lh_hosted_reprovision "$INSTANCE_ID"

      - name: Wait for services
        run: |
          check_health() {
            local url="$1"
            local name="$2"
            local max=30
            for i in $(seq 1 "$max"); do
              if curl -sf --max-time 5 "$url" > /dev/null 2>&1; then
                echo "✓ $name is up (attempt $i)"
                return 0
              fi
              echo "  $name not ready (attempt $i/$max)..."
              sleep 5
            done
            echo "✗ $name did not become healthy"
            return 1
          }

          check_health "$API_URL/api/health" "User instance"
          check_health "$CONTROL_PLANE_URL/health" "Control plane"
          check_health "$MARKETING_URL" "Marketing site"

      - name: Run smoke tests
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          chmod +x scripts/smoke-prod.sh
          ./scripts/smoke-prod.sh --no-llm

      - name: Summary
        if: always()
        run: |
          echo "## Deploy + Verify Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Instance:** $INSTANCE_SUBDOMAIN" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Instance URL:** $INSTANCE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Marketing:** $MARKETING_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Control Plane:** $CONTROL_PLANE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Previous SHA:** ${{ steps.prev.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"

      # Disabled: auto-rollback can fight rapid iteration. Re-enable when stable.
      # - name: Rollback user instance
      #   if: failure()
      #   run: |
      #     PREV_SHA="${{ steps.prev.outputs.sha }}"
      #     if [[ -n "$PREV_SHA" ]]; then
      #       echo "Rolling back to image revision: $PREV_SHA"
      #       ssh zerg "docker pull ghcr.io/cipher982/longhouse-runtime:${PREV_SHA} && docker stop longhouse-${INSTANCE_SUBDOMAIN} && docker rm longhouse-${INSTANCE_SUBDOMAIN}"
      #     else
      #       echo "No previous SHA recorded — cannot rollback"
      #     fi

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_SHA="${{ steps.prev.outputs.sha }}"
          gh issue create \
            --title "Deploy smoke failed for ${GITHUB_SHA:0:7}" \
            --body "$(cat <<EOF_BODY
          Smoke tests failed after deploying commit ${{ github.sha }}.

          - Instance: $INSTANCE_URL
          - Previous image SHA: \`${PREV_SHA:-unknown}\`
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Auto-rollback is disabled. Check the workflow logs for which checks failed.
          EOF_BODY
          )" \
            --label "deploy-failure"
