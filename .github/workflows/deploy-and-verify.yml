name: Deploy and Verify

on:
  workflow_run:
    workflows: ["Publish Runtime Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-and-verify
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy Demo + Hosted Canary"
    runs-on: cube-deploy
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      PUBLIC_DEMO_URL: https://longhouse.ai
      CONTROL_PLANE_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: david010
      ZERG_HOST: 100.120.197.80

    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: ./scripts/ci/setup-deploy-ssh.sh

      - name: Record previous canary image SHA
        id: prev
        run: |
          CONTAINER_NAME="longhouse-${INSTANCE_SUBDOMAIN}"
          FULL_SHA=$(ssh zerg "docker inspect $CONTAINER_NAME --format '{{index .Config.Labels \"org.opencontainers.image.revision\"}}'" 2>/dev/null || echo "")
          SHORT_SHA="${FULL_SHA:0:7}"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Previous canary image revision: ${SHORT_SHA:-unknown} (full: ${FULL_SHA:-unknown})"

      - name: Deploy public demo runtime
        run: ./scripts/ops/coolify-deploy.sh longhouse-demo --timeout 900

      - name: Wait for public demo and control plane
        run: |
          ./scripts/ci/wait-for-http.sh "$PUBLIC_DEMO_URL/api/health" "Public demo runtime"
          ./scripts/ci/wait-for-http.sh "$CONTROL_PLANE_URL/health" "Control plane"

      - name: Resolve hosted canary instance
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: ./scripts/ci/export-hosted-instance-env.sh

      - name: Reprovision hosted canary
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          . scripts/lib/hosted-instance.sh
          lh_hosted_reprovision "$INSTANCE_ID"

      - name: Wait for hosted canary
        run: |
          ./scripts/ci/wait-for-http.sh "$API_URL/api/health" "Hosted canary"
          ./scripts/ci/wait-for-http.sh "$PUBLIC_DEMO_URL/api/health" "Public demo runtime"
          ./scripts/ci/wait-for-http.sh "$CONTROL_PLANE_URL/health" "Control plane"

      - name: Run smoke tests
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: ./scripts/qa/smoke-prod.sh --no-llm

      - name: Summary
        if: always()
        run: |
          echo "## Runtime Deploy + Verify Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Hosted canary:** $INSTANCE_SUBDOMAIN" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Hosted canary URL:** $INSTANCE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Public demo:** $PUBLIC_DEMO_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Control plane:** $CONTROL_PLANE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Previous canary SHA:** ${{ steps.prev.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI is not installed on this runner; skipping issue creation."
            exit 0
          fi
          PREV_SHA="${{ steps.prev.outputs.sha }}"
          COMMIT_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          gh issue create \
            --title "Runtime deploy smoke failed for ${COMMIT_SHA:0:7}" \
            --body "$(cat <<EOF_BODY
          Smoke tests failed after deploying runtime commit ${COMMIT_SHA}.

          - Hosted canary: $INSTANCE_URL
          - Public demo: $PUBLIC_DEMO_URL
          - Previous canary image SHA: \`${PREV_SHA:-unknown}\`
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the workflow logs for which checks failed.
          EOF_BODY
          )" \
            --label "deploy-failure"
