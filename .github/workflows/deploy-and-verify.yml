name: Deploy and Verify

on:
  workflow_run:
    workflows: ["Publish Runtime Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      runtime_image_tag:
        description: "Override runtime image tag for manual deploys (defaults to latest for recovery runs)"
        required: false
        type: string

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('deploy-and-verify-manual-{0}', github.run_id) || format('deploy-and-verify-{0}', github.event.workflow_run.head_branch || github.ref_name) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  gate:
    name: "Gate deploy on full CI"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
      head_branch: ${{ steps.meta.outputs.head_branch }}
      runtime_image_name: ${{ steps.meta.outputs.runtime_image_name }}
      runtime_image_tag: ${{ steps.meta.outputs.runtime_image_tag }}
      runtime_image_ref: ${{ steps.meta.outputs.runtime_image_ref }}
      stale: ${{ steps.freshness.outputs.stale }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Resolve target commit
        id: meta
        run: |
          HEAD_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          HEAD_BRANCH="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"
          IMAGE_TAG=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_TAG="${{ github.event.inputs.runtime_image_tag || '' }}"
          fi
          if [[ -z "$IMAGE_TAG" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_TAG="latest"
          elif [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="$HEAD_SHA"
          fi
          {
            echo "head_sha=$HEAD_SHA"
            echo "head_branch=$HEAD_BRANCH"
            echo "runtime_image_name=ghcr.io/${{ github.repository_owner }}/longhouse-runtime"
            echo "runtime_image_tag=$IMAGE_TAG"
            echo "runtime_image_ref=ghcr.io/${{ github.repository_owner }}/longhouse-runtime:$IMAGE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for full CI gate
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: ./.github/actions/wait-for-ci
        with:
          head_sha: ${{ steps.meta.outputs.head_sha }}
          head_branch: ${{ steps.meta.outputs.head_branch }}
          github_token: ${{ github.token }}

      - name: Check if commit is superseded
        id: freshness
        uses: ./.github/actions/check-freshness
        with:
          head_sha: ${{ steps.meta.outputs.head_sha }}
          github_token: ${{ github.token }}

      - name: Summary
        if: ${{ steps.freshness.outputs.stale == 'true' }}
        run: |
          {
            echo "## Runtime Deploy + Verify Results"
            echo ""
            echo "- Skipped because commit \`${{ steps.meta.outputs.head_sha }}\` is no longer the head of \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-demo:
    name: "Deploy public demo runtime"
    runs-on: cube-deploy
    timeout-minutes: 20
    needs: gate
    if: ${{ needs.gate.outputs.stale != 'true' }}

    env:
      PUBLIC_DEMO_URL: https://longhouse.ai
      INSTANCE_SUBDOMAIN: david010
      ZERG_HOST: 100.120.197.80

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: ./scripts/ci/setup-deploy-ssh.sh

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify runtime image exists
        run: docker manifest inspect "${{ needs.gate.outputs.runtime_image_ref }}" >/dev/null

      - name: Deploy public demo runtime
        run: |
          ./scripts/ops/coolify-deploy.sh \
            longhouse-demo \
            --docker-image "${{ needs.gate.outputs.runtime_image_name }}" \
            --docker-tag "${{ needs.gate.outputs.runtime_image_tag }}" \
            --timeout 900

  reprovision-canary:
    name: "Reprovision hosted canary"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gate
    if: ${{ needs.gate.outputs.stale != 'true' }}
    outputs:
      instance_id: ${{ steps.instance.outputs.instance_id }}
      instance_url: ${{ steps.instance.outputs.instance_url }}
      frontend_url: ${{ steps.instance.outputs.frontend_url }}
      api_url: ${{ steps.instance.outputs.api_url }}
    env:
      CONTROL_PLANE_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: david010

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Wait for control plane
        run: ./scripts/ci/wait-for-http.sh "$CONTROL_PLANE_URL/health" "Control plane"

      - name: Resolve hosted canary instance
        id: instance
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          . scripts/lib/hosted-instance.sh
          lh_hosted_prepare_target "$INSTANCE_SUBDOMAIN" "" ""
          {
            echo "instance_id=$LH_INSTANCE_ID"
            echo "instance_url=$LH_INSTANCE_URL"
            echo "frontend_url=$LH_TARGET_FRONTEND_URL"
            echo "api_url=$LH_TARGET_API_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Reprovision hosted canary
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: |
          . scripts/lib/hosted-instance.sh
          lh_hosted_reprovision "${{ steps.instance.outputs.instance_id }}" "${{ needs.gate.outputs.runtime_image_ref }}"

  verify:
    name: "Verify demo + hosted canary"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - gate
      - deploy-demo
      - reprovision-canary
    if: ${{ always() && needs.gate.result == 'success' && needs.gate.outputs.stale != 'true' }}
    env:
      PUBLIC_DEMO_URL: https://longhouse.ai
      CONTROL_PLANE_URL: https://control.longhouse.ai
      INSTANCE_SUBDOMAIN: david010
      INSTANCE_URL: ${{ needs.reprovision-canary.outputs.instance_url }}
      FRONTEND_URL: ${{ needs.reprovision-canary.outputs.frontend_url }}
      API_URL: ${{ needs.reprovision-canary.outputs.api_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Fail if deploy prerequisites failed
        if: ${{ needs.deploy-demo.result != 'success' || needs.reprovision-canary.result != 'success' }}
        run: |
          echo "Deploy prerequisites failed:"
          echo "  deploy-demo=${{ needs.deploy-demo.result }}"
          echo "  reprovision-canary=${{ needs.reprovision-canary.result }}"
          exit 1

      - name: Wait for public demo, control plane, and hosted canary
        if: ${{ needs.deploy-demo.result == 'success' && needs.reprovision-canary.result == 'success' }}
        run: |
          ./scripts/ci/wait-for-http.sh "$PUBLIC_DEMO_URL/api/health" "Public demo runtime"
          ./scripts/ci/wait-for-http.sh "$CONTROL_PLANE_URL/health" "Control plane"
          ./scripts/ci/wait-for-http.sh "$API_URL/api/health" "Hosted canary"

      - name: Run smoke tests
        if: ${{ needs.deploy-demo.result == 'success' && needs.reprovision-canary.result == 'success' }}
        env:
          CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
        run: ./scripts/qa/smoke-prod.sh --no-llm

      - name: Summary
        if: always()
        run: |
          {
            echo "## Runtime Deploy + Verify Results"
            echo ""
            echo "- **Hosted canary:** $INSTANCE_SUBDOMAIN"
            echo "- **Hosted canary URL:** $INSTANCE_URL"
            echo "- **Public demo:** $PUBLIC_DEMO_URL"
            echo "- **Control plane:** $CONTROL_PLANE_URL"
            echo "- **Commit:** ${{ needs.gate.outputs.head_sha }}"
            echo "- **Demo image:** \`${{ needs.gate.outputs.runtime_image_name }}:${{ needs.gate.outputs.runtime_image_tag }}\`"
            echo "- **Demo deploy job:** \`${{ needs.deploy-demo.result }}\`"
            echo "- **Canary reprovision job:** \`${{ needs.reprovision-canary.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue on failure
        if: ${{ failure() || needs.deploy-demo.result != 'success' || needs.reprovision-canary.result != 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI is not installed on this runner; skipping issue creation."
            exit 0
          fi
          COMMIT_SHA="${{ needs.gate.outputs.head_sha }}"
          gh issue create \
            --title "Runtime deploy smoke failed for ${COMMIT_SHA:0:7}" \
            --body "$(cat <<EOF_BODY
          Smoke tests failed after deploying runtime commit ${COMMIT_SHA}.

          - Hosted canary: $INSTANCE_URL
          - Public demo: $PUBLIC_DEMO_URL
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the workflow logs for which checks failed.
          EOF_BODY
          )" \
            --label "deploy-failure"
