name: Deploy and Verify

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runtime_image_tag:
        description: "Override runtime image tag for manual deploys (defaults to the current SHA)"
        required: false
        type: string

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  gate:
    name: "Queue deploy behind earlier main SHAs + green CI"
    runs-on: ubuntu-latest
    outputs:
      predecessor_sha: ${{ steps.meta.outputs.predecessor_sha }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      head_branch: ${{ steps.meta.outputs.head_branch }}
      runtime_image_name: ${{ steps.meta.outputs.runtime_image_name }}
      runtime_image_tag: ${{ steps.meta.outputs.runtime_image_tag }}
      runtime_image_ref: ${{ steps.meta.outputs.runtime_image_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Resolve target commit
        id: meta
        run: |
          HEAD_SHA="${{ github.sha }}"
          HEAD_BRANCH="${{ github.ref_name }}"
          PREDECESSOR_SHA=""
          IMAGE_TAG=""

          if [[ "${{ github.event_name }}" == "push" ]]; then
            PREDECESSOR_SHA="${{ github.event.before }}"
            if [[ "$PREDECESSOR_SHA" =~ ^0+$ ]]; then
              PREDECESSOR_SHA=""
            fi
          else
            IMAGE_TAG="${{ github.event.inputs.runtime_image_tag || '' }}"
          fi

          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="$HEAD_SHA"
          fi

          {
            echo "predecessor_sha=$PREDECESSOR_SHA"
            echo "head_sha=$HEAD_SHA"
            echo "head_branch=$HEAD_BRANCH"
            echo "runtime_image_name=ghcr.io/${{ github.repository_owner }}/longhouse-runtime"
            echo "runtime_image_tag=$IMAGE_TAG"
            echo "runtime_image_ref=ghcr.io/${{ github.repository_owner }}/longhouse-runtime:$IMAGE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Detect frontend-only change
        id: scope
        if: ${{ github.event_name == 'push' && steps.meta.outputs.predecessor_sha != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Compare changed files between predecessor and current SHA
          CHANGED=$(gh api repos/${{ github.repository }}/compare/${{ steps.meta.outputs.predecessor_sha }}...${{ github.sha }} \
            --jq '.files[].filename' 2>/dev/null || echo "UNKNOWN")

          if [[ "$CHANGED" == "UNKNOWN" ]]; then
            echo "frontend_only=false" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -qvE '^(web/|\.github/|Makefile$|docs/|\.claude/|CLAUDE\.md$|VISION\.md$|README\.md$|\.agents/)'; then
            echo "frontend_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Frontend-only change detected — skipping CI gate"
          fi

      - name: Wait for previous main deploy to clear
        if: ${{ github.event_name == 'push' && steps.meta.outputs.predecessor_sha != '' }}
        uses: ./.github/actions/wait-for-ci
        with:
          head_sha: ${{ steps.meta.outputs.predecessor_sha }}
          head_branch: ${{ steps.meta.outputs.head_branch }}
          github_token: ${{ github.token }}
          workflow_id: deploy-and-verify.yml
          event: push
          require_success: "false"
          allow_missing: "true"
          timeout_seconds: "7200"

      - name: Wait for full CI gate
        if: ${{ github.event_name == 'push' && steps.scope.outputs.frontend_only != 'true' }}
        uses: ./.github/actions/wait-for-ci
        with:
          head_sha: ${{ steps.meta.outputs.head_sha }}
          head_branch: ${{ steps.meta.outputs.head_branch }}
          github_token: ${{ github.token }}

      - name: Wait for runtime image publish
        if: ${{ github.event_name == 'push' }}
        uses: ./.github/actions/wait-for-ci
        with:
          head_sha: ${{ steps.meta.outputs.head_sha }}
          head_branch: ${{ steps.meta.outputs.head_branch }}
          github_token: ${{ github.token }}
          workflow_id: runtime-image.yml
          event: workflow_run
          timeout_seconds: "3600"

  deploy-and-verify:
    name: "Deploy demo + canary + hosted live QA"
    runs-on: cube-deploy
    timeout-minutes: 60
    needs: gate
    env:
      CONTROL_PLANE_ADMIN_TOKEN: ${{ secrets.CONTROL_PLANE_ADMIN_TOKEN }}
      CONTROL_PLANE_URL: https://control.longhouse.ai
      PUBLIC_DEMO_URL: https://longhouse.ai
      INSTANCE_SUBDOMAIN: david010
      QA_HOME: /tmp/hosted-live-qa-${{ github.run_id }}-${{ github.run_attempt }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
      ZERG_HOST: 100.120.197.80

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Restore Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            longhouse-bun-${{ runner.os }}-

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            longhouse-playwright-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers + deps
        run: cd e2e && bunx playwright install --with-deps chromium

      - name: Prepare isolated QA home
        run: mkdir -p "$QA_HOME" "$PLAYWRIGHT_BROWSERS_PATH"

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: ./scripts/ci/setup-deploy-ssh.sh

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify runtime image exists
        run: docker manifest inspect "${{ needs.gate.outputs.runtime_image_ref }}" >/dev/null

      - name: Deploy public demo runtime
        run: |
          ./scripts/ops/coolify-deploy.sh \
            longhouse-demo \
            --docker-image "${{ needs.gate.outputs.runtime_image_name }}" \
            --docker-tag "${{ needs.gate.outputs.runtime_image_tag }}" \
            --timeout 900

      - name: Wait for control plane
        run: ./scripts/ci/wait-for-http.sh "$CONTROL_PLANE_URL/health" "Control plane"

      - name: Resolve hosted canary instance
        id: instance
        run: |
          . scripts/lib/hosted-instance.sh
          lh_hosted_prepare_target "$INSTANCE_SUBDOMAIN" "" ""
          {
            echo "instance_id=$LH_INSTANCE_ID"
            echo "instance_url=$LH_INSTANCE_URL"
            echo "frontend_url=$LH_TARGET_FRONTEND_URL"
            echo "api_url=$LH_TARGET_API_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Reprovision hosted canary
        run: |
          . scripts/lib/hosted-instance.sh
          lh_hosted_reprovision "${{ steps.instance.outputs.instance_id }}" "${{ needs.gate.outputs.runtime_image_ref }}"

      - name: Wait for public demo, control plane, and hosted canary
        env:
          API_URL: ${{ steps.instance.outputs.api_url }}
        run: |
          ./scripts/ci/wait-for-http.sh "$PUBLIC_DEMO_URL/api/health" "Public demo runtime"
          ./scripts/ci/wait-for-http.sh "$CONTROL_PLANE_URL/health" "Control plane"
          ./scripts/ci/wait-for-http.sh "$API_URL/api/health" "Hosted canary"

      - name: Run smoke tests
        env:
          API_URL: ${{ steps.instance.outputs.api_url }}
          FRONTEND_URL: ${{ steps.instance.outputs.frontend_url }}
          INSTANCE_URL: ${{ steps.instance.outputs.instance_url }}
        run: ./scripts/qa/smoke-prod.sh --no-llm

      - name: Run hosted live QA
        id: qa_live
        env:
          HOME: ${{ env.QA_HOME }}
        run: |
          attempts=0
          until make qa-live; do
            attempts=$((attempts + 1))
            if [[ "$attempts" -ge 2 ]]; then
              exit 1
            fi
            echo "qa-live failed; retrying once after 5s..." >&2
            sleep 5
          done

      - name: Run hosted chat QA
        id: qa_live_chat
        env:
          HOME: ${{ env.QA_HOME }}
        run: |
          attempts=0
          until make qa-live-chat; do
            attempts=$((attempts + 1))
            if [[ "$attempts" -ge 2 ]]; then
              exit 1
            fi
            echo "qa-live-chat failed; retrying once after 5s..." >&2
            sleep 5
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## Runtime Deploy + Verify Results"
            echo ""
            echo "- **Hosted canary:** $INSTANCE_SUBDOMAIN"
            echo "- **Hosted canary URL:** ${{ steps.instance.outputs.instance_url || 'unresolved' }}"
            echo "- **Public demo:** $PUBLIC_DEMO_URL"
            echo "- **Control plane:** $CONTROL_PLANE_URL"
            echo "- **Commit:** ${{ needs.gate.outputs.head_sha }}"
            echo "- **Demo image:** \`${{ needs.gate.outputs.runtime_image_name }}:${{ needs.gate.outputs.runtime_image_tag }}\`"
            echo "- **qa-live:** \`${{ steps.qa_live.outcome || 'skipped' }}\`"
            echo "- **qa-live-chat:** \`${{ steps.qa_live_chat.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live QA artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hosted-live-qa-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/qa-live-fail-*.png
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI is not installed on this runner; skipping issue creation."
            exit 0
          fi
          COMMIT_SHA="${{ needs.gate.outputs.head_sha }}"
          INSTANCE_URL="${{ steps.instance.outputs.instance_url }}"
          gh issue create \
            --title "Runtime deploy smoke failed for ${COMMIT_SHA:0:7}" \
            --body "$(cat <<EOF_BODY
          Runtime deploy and/or hosted QA failed for commit ${COMMIT_SHA}.

          - Hosted canary: ${INSTANCE_URL:-unresolved}
          - Public demo: $PUBLIC_DEMO_URL
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the workflow logs for which step failed.
          EOF_BODY
          )" \
            --label "deploy-failure"
