name: Documentation Drift Check

on:
  pull_request:
    # Run on all PRs — the LLM decides what's relevant (~$0.01/run)
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-drift:
    runs-on: ubuntu-latest
    # Skip fork PRs (no secrets)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref || 'main' }}

      - name: Check docs for drift
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/ci/docs-drift-check.py \
            --base-ref origin/${{ github.event.pull_request.base.ref || 'main' }}
