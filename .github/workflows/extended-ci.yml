name: Extended CI

on:
  # Triggered by an external scheduler via workflow_dispatch.
  workflow_dispatch: {}

# Never cancel runs
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

env:
  # Self-hosted runners can have global pip config pointing at private indexes.
  # Force public PyPI for CI so setup-python's pip step doesn't fail.
  PIP_INDEX_URL: https://pypi.org/simple
  PIP_EXTRA_INDEX_URL: ""
  # Isolate E2E DBs per run to avoid cross-run contamination on shared runners.
  E2E_DB_DIR: /tmp/zerg_e2e_dbs/${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  extended:
    runs-on: cube
    name: "🧪 Extended CI (Full Suite)"
    env:
      # E2E tests use per-backend SQLite databases (no Postgres needed)
      FERNET_SECRET: ${{ secrets.FERNET_SECRET }}
      # the runner has many cores; xdist -n auto can be too aggressive
      PYTEST_XDIST_COMMIS: "8"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
    - uses: actions/checkout@v6

    - name: Restore Bun download cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: longhouse-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          longhouse-bun-${{ runner.os }}-

    - name: Restore Playwright browser cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: longhouse-playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
        restore-keys: |
          longhouse-playwright-${{ runner.os }}-

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.2.20'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y make build-essential pkg-config

    - name: Install Playwright browsers + deps
      run: cd e2e && bunx playwright install --with-deps chromium

    - name: Pre-install backend deps
      run: cd server && uv sync

    - name: Run Extended Suite
      run: make test-full

    - name: Upload E2E artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: extended-ci-e2e-artifacts
        path: |
          e2e/test-results
          e2e/playwright-report
