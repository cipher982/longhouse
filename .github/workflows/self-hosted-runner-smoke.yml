name: Self-hosted Runner Smoke Test

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: cube-runner-canary
  cancel-in-progress: true

jobs:
  smoke:
    name: "🧪 Canary (self-hosted on cube)"
    runs-on: cube
    timeout-minutes: 10
    if: ${{ github.event_name != 'schedule' || vars.CUBE_RUNNER_CANARY_ENABLED != 'false' }}

    steps:
      - name: Basic host info
        run: |
          set -euo pipefail
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          uname -a
          id
          nproc || true
          df -h /

      - name: Docker availability
        run: |
          set -euo pipefail
          command -v docker
          docker version
