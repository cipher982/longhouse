name: Probe WarpBuild

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: 'WarpBuild runner label'
        required: true
        default: 'warp-macos-latest-arm64-6x'
      run_build:
        description: 'Run full managed Codex build'
        required: true
        default: 'true'

jobs:
  probe:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 60
    steps:
      - name: Show host specs
        run: |
          echo "::group::Runner identity"
          uname -a
          sysctl -n machdep.cpu.brand_string 2>/dev/null || true
          sysctl -n hw.ncpu 2>/dev/null || nproc
          sysctl -n hw.memsize 2>/dev/null || free -h
          sw_vers 2>/dev/null || cat /etc/os-release
          echo "Runner: ${{ runner.os }}/${{ runner.arch }}"
          echo "::endgroup::"

      - uses: actions/checkout@v6
        if: ${{ inputs.run_build == 'true' }}
        with:
          fetch-depth: 1

      - name: Setup Rust
        if: ${{ inputs.run_build == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: ${{ inputs.run_build == 'true' && runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libcap-dev

      - name: Time managed Codex build
        if: ${{ inputs.run_build == 'true' }}
        run: |
          mkdir -p prebuilt
          chmod +x scripts/release/build-managed-codex.sh
          start=$SECONDS
          scripts/release/build-managed-codex.sh --output prebuilt/longhouse-codex
          elapsed=$((SECONDS - start))
          echo "managed_codex_build_seconds=$elapsed" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "=========================================="
          echo "BUILD TIME: ${elapsed}s on ${{ inputs.runner_label }}"
          echo "=========================================="
          ls -lh prebuilt/longhouse-codex
          file prebuilt/longhouse-codex
