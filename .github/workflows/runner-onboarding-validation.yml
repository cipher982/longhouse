name: Runner Onboarding Validation Ring

on:
  push:
    paths:
      - '.github/workflows/runner-onboarding-validation.yml'
      - '.github/workflows/launch-gate.yml'
      - '.github/workflows/test-install.yml'
      - 'e2e/**'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/connect.py'
      - 'server/zerg/cli/doctor.py'
      - 'server/zerg/cli/onboard.py'
      - 'server/zerg/cli/serve.py'
      - 'web/src/components/AddRunnerModal.tsx'
      - 'web/src/components/chat/RunnerSetupCard.tsx'
      - 'web/src/lib/runnerInstallCommands.ts'
      - 'web/src/pages/RunnersPage.tsx'
      - 'server/zerg/routers/runners.py'
      - 'server/zerg/routers/templates/install.sh'
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/qa-oss.sh'
      - 'scripts/ops/run-onboarding-funnel.sh'
      - 'Makefile'
      - 'README.md'
  pull_request:
    paths:
      - '.github/workflows/runner-onboarding-validation.yml'
      - '.github/workflows/launch-gate.yml'
      - '.github/workflows/test-install.yml'
      - 'e2e/**'
      - 'server/pyproject.toml'
      - 'server/zerg/cli/connect.py'
      - 'server/zerg/cli/doctor.py'
      - 'server/zerg/cli/onboard.py'
      - 'server/zerg/cli/serve.py'
      - 'web/src/components/AddRunnerModal.tsx'
      - 'web/src/components/chat/RunnerSetupCard.tsx'
      - 'web/src/lib/runnerInstallCommands.ts'
      - 'web/src/pages/RunnersPage.tsx'
      - 'server/zerg/routers/runners.py'
      - 'server/zerg/routers/templates/install.sh'
      - 'scripts/install.sh'
      - 'scripts/ci/installer-first-run.sh'
      - 'scripts/qa/qa-oss.sh'
      - 'scripts/ops/run-onboarding-funnel.sh'
      - 'Makefile'
      - 'README.md'
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:
    inputs:
      run_extended_hosted_matrix:
        description: 'Run the extra hosted ARM/macOS jobs'
        required: false
        default: true
        type: boolean
      run_cube_self_hosted:
        description: 'Run cube self-hosted Linux x64 smoke'
        required: false
        default: true
        type: boolean
      run_linux_x64:
        description: 'Run Linux x64 self-hosted smoke'
        required: false
        default: false
        type: boolean
      linux_x64_runner_label:
        description: 'Optional label for a Linux x64 self-hosted runner'
        required: false
        default: ''
        type: string
      run_macos_self_hosted:
        description: 'Run macOS arm64 self-hosted smoke'
        required: false
        default: false
        type: boolean
      macos_runner_label:
        description: 'Label for the macOS arm64 self-hosted runner'
        required: false
        default: ''
        type: string

env:
  PIP_INDEX_URL: https://pypi.org/simple
  PIP_EXTRA_INDEX_URL: ""
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  hosted-onboarding-core:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            project: all
            browsers: 'chromium firefox webkit'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "hosted-onboarding--${{ matrix.os }}--${{ matrix.project }}"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Ensure make available
        run: ./scripts/ci/ensure-make.sh

      - name: Install Playwright browsers
        run: |
          (cd e2e && bun install --silent)
          ./scripts/ci/install-playwright.sh ${{ matrix.browsers }}

      - name: Run runner install contract tests
        run: make test-install-runner

      - name: Run onboarding browser ring
        run: |
          if [[ "${{ matrix.project }}" == "all" ]]; then
            make test-e2e-onboarding
          else
            make test-e2e-onboarding PROJECT=${{ matrix.project }}
          fi

      - name: Upload onboarding artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-artifacts-${{ matrix.os }}-${{ matrix.project }}
          if-no-files-found: ignore
          path: |
            e2e/test-results
            e2e/playwright-report
            qa-oss-server.log

  hosted-onboarding-extended:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_extended_hosted_matrix) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            project: onboarding-chromium
            browsers: 'chromium'
          - os: macos-latest
            project: onboarding-webkit
            browsers: 'chromium firefox webkit'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: "hosted-onboarding--${{ matrix.os }}--${{ matrix.project }}"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Ensure make available
        run: ./scripts/ci/ensure-make.sh

      - name: Install Playwright browsers
        run: |
          (cd e2e && bun install --silent)
          ./scripts/ci/install-playwright.sh ${{ matrix.browsers }}

      - name: Run runner install contract tests
        run: make test-install-runner

      - name: Run onboarding browser ring
        run: make test-e2e-onboarding PROJECT=${{ matrix.project }}

      - name: Upload onboarding artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-artifacts-${{ matrix.os }}-${{ matrix.project }}
          if-no-files-found: ignore
          path: |
            e2e/test-results
            e2e/playwright-report
            qa-oss-server.log

  synthetic-first-user:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "synthetic-first-user--fresh-clone"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install frontend test deps
        run: cd e2e && bun install --silent

      - name: Install Playwright Chromium shell
        run: |
          # The README onboarding contract runs the onboarding-chromium project only.
          LONGHOUSE_PLAYWRIGHT_ONLY_SHELL=1 ./scripts/ci/install-playwright.sh chromium

      - name: Run fresh-clone onboarding funnel
        run: make onboarding-funnel

      - name: Upload fresh-clone onboarding artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-funnel-artifacts
          if-no-files-found: ignore
          path: |
            /tmp/longhouse-onboarding/e2e/test-results
            /tmp/longhouse-onboarding/e2e/playwright-report
            /tmp/longhouse-onboarding/onboarding-diagnostics

  self-hosted-cube-linux-x64:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_cube_self_hosted) }}
    runs-on: cube
    timeout-minutes: 30
    name: "self-hosted-onboarding--linux-x64--cube"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install Playwright Chromium shell
        run: |
          (cd e2e && bun install --silent)
          # This lane runs the onboarding-chromium project only.
          LONGHOUSE_PLAYWRIGHT_ONLY_SHELL=1 ./scripts/ci/install-playwright.sh chromium

      - name: Run runner install contract tests
        run: make test-install-runner

      - name: Run onboarding smoke on cube
        run: make test-e2e-onboarding PROJECT=onboarding-chromium

      - name: Upload self-hosted cube Linux x64 artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-self-hosted-cube-linux-x64
          if-no-files-found: ignore
          path: |
            e2e/test-results
            e2e/playwright-report
            qa-oss-server.log

  self-hosted-linux-x64:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_linux_x64 && inputs.linux_x64_runner_label != '' }}
    runs-on: ${{ inputs.linux_x64_runner_label }}
    timeout-minutes: 30
    name: "self-hosted-onboarding--linux-x64--${{ inputs.linux_x64_runner_label }}"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install Playwright Chromium shell
        run: |
          (cd e2e && bun install --silent)
          # This lane runs the onboarding-chromium project only.
          LONGHOUSE_PLAYWRIGHT_ONLY_SHELL=1 ./scripts/ci/install-playwright.sh chromium

      - name: Run runner install contract tests
        run: make test-install-runner

      - name: Run onboarding smoke on Linux x64
        run: make test-e2e-onboarding PROJECT=onboarding-chromium

      - name: Upload self-hosted Linux x64 artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-self-hosted-linux-x64
          if-no-files-found: ignore
          path: |
            e2e/test-results
            e2e/playwright-report
            qa-oss-server.log

  self-hosted-macos-arm64:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_macos_self_hosted && inputs.macos_runner_label != '' }}
    runs-on: ${{ inputs.macos_runner_label }}
    timeout-minutes: 30
    name: "self-hosted-onboarding--macos-arm64--${{ inputs.macos_runner_label }}"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock', 'e2e/package.json') }}
          restore-keys: |
            runner-onboarding-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright browsers
        run: |
          cd e2e
          bun install --silent
          bunx playwright install chromium firefox webkit

      - name: Run runner install contract tests
        run: make test-install-runner

      - name: Run onboarding smoke on macOS arm64
        run: make test-e2e-onboarding PROJECT=onboarding-webkit

      - name: Upload self-hosted macOS ARM64 artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-self-hosted-macos-arm64
          if-no-files-found: ignore
          path: |
            e2e/test-results
            e2e/playwright-report
            qa-oss-server.log
