name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to publish from (for example v0.1.5)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
    permissions:
      contents: write
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: apps/zerg/frontend-web
        run: |
          bun install
          bun run build

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        working-directory: apps/zerg/backend
        run: uv build --wheel

      - name: Upload release wheel assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WHEEL=$(find apps/zerg/backend/dist -maxdepth 1 -name 'longhouse-*.whl' | head -1)
          gh release upload "$RELEASE_TAG" "$WHEEL" --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/zerg/backend/dist/
