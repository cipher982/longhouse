backend:
  - 'server/**'
  - 'config/**'

frontend:
  - 'web/**'
  - 'bun.lock'
  - 'package.json'

engine:
  - 'engine/**'

schemas:
  - 'schemas/**'
  - 'scripts/generate/**'
  - 'Makefile'

packaging:
  - '.github/path-filters.yml'
  - '.github/workflows/contract-first-ci.yml'
  - 'server/hatch_build.py'
  - 'server/pyproject.toml'
  - 'server/setup.cfg'
  - 'server/zerg/**'
  - 'web/**'
  - 'scripts/qa/test-wheel-package.sh'

runner:
  - 'runner/**'

ios:
  - 'ios/**'
  - 'scripts/build/generate_build_identity.py'
  - 'scripts/build/stage_ios_build_identity.sh'
  # Re-run iOS tests when CI plumbing changes to verify the job itself
  - 'Makefile'
  - 'scripts/ci/run_ios_tests.sh'
  - 'scripts/ci/select_ios_simulator.py'
  - '.github/path-filters.yml'
  - '.github/workflows/contract-first-ci.yml'

e2e:
  - 'e2e/**'
  - 'server/**'
  - 'web/**'
  - 'config/**'

models:
  - 'config/models.json'
  - 'server/zerg/llm/**'
  - 'scripts/qa/smoke_models.py'

scripts:
  - 'scripts/**'
  - '.github/path-filters.yml'
  - '.github/workflows/contract-first-ci.yml'

runtime_image:
  - 'bun.lock'
  - 'config/**'
  - 'docker/entrypoint.sh'
  - 'docker/runtime.dockerfile'
  - 'engine/**'
  - 'server/**'
  - 'web/**'
  - '.github/workflows/runtime-image.yml'

deploy_verify:
  - 'bun.lock'
  - 'config/**'
  - 'docker/entrypoint.sh'
  - 'docker/runtime.dockerfile'
  - 'engine/**'
  - 'server/**'
  - 'web/**'
  - 'Makefile'
  - 'scripts/ci/setup-deploy-ssh.sh'
  - 'scripts/ci/wait-for-http.sh'
  - 'scripts/lib/hosted-instance.sh'
  - 'scripts/ops/coolify-deploy.sh'
  - 'scripts/qa/**'
  - '.github/actions/wait-for-ci/**'
  - '.github/workflows/deploy-and-verify.yml'
  - '.github/workflows/runtime-image.yml'
