name: Wait for workflow gate
description: Poll a workflow run for the target SHA until it reaches an accepted terminal state

inputs:
  head_sha:
    description: Commit SHA to wait for
    required: true
  head_branch:
    description: Branch the commit lives on
    required: true
  github_token:
    description: Token for GitHub API calls
    required: true
  workflow_id:
    description: Workflow filename or ID to poll
    required: false
    default: contract-first-ci.yml
  event:
    description: Workflow event type to filter on
    required: false
    default: push
  require_success:
    description: When true, require the workflow to conclude successfully
    required: false
    default: "true"
  allow_missing:
    description: When true, succeed if no matching workflow run appears before timeout
    required: false
    default: "false"
  timeout_seconds:
    description: Maximum time to wait before failing
    required: false
    default: "1200"
  ignored_failure_jobs:
    description: Comma- or newline-separated job names whose failures should not block this gate
    required: false
    default: ""
  required_jobs:
    description: Comma- or newline-separated job names that must complete successfully or be skipped before this gate passes
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/github-script@v8
      env:
        HEAD_SHA: ${{ inputs.head_sha }}
        HEAD_BRANCH: ${{ inputs.head_branch }}
        WORKFLOW_ID: ${{ inputs.workflow_id }}
        WORKFLOW_EVENT: ${{ inputs.event }}
        REQUIRE_SUCCESS: ${{ inputs.require_success }}
        ALLOW_MISSING: ${{ inputs.allow_missing }}
        TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        IGNORED_FAILURE_JOBS: ${{ inputs.ignored_failure_jobs }}
        REQUIRED_JOBS: ${{ inputs.required_jobs }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const sha = (process.env.HEAD_SHA || '').trim();
          const branch = (process.env.HEAD_BRANCH || '').trim();
          const workflowId = (process.env.WORKFLOW_ID || 'contract-first-ci.yml').trim();
          const workflowEvent = (process.env.WORKFLOW_EVENT || '').trim();
          const requireSuccess = (process.env.REQUIRE_SUCCESS || 'true') === 'true';
          const allowMissing = (process.env.ALLOW_MISSING || 'false') === 'true';
          const delayMs = 5000;
          const timeoutSeconds = Number(process.env.TIMEOUT_SECONDS || '1200');
          const maxAttempts = Math.max(1, Math.ceil((timeoutSeconds * 1000) / delayMs));
          const missingGraceAttempts = 6;
          const ignoredFailureJobs = new Set(
            (process.env.IGNORED_FAILURE_JOBS || '')
              .split(/[\n,]/)
              .map((name) => name.trim())
              .filter(Boolean),
          );
          const requiredJobs = new Set(
            (process.env.REQUIRED_JOBS || '')
              .split(/[\n,]/)
              .map((name) => name.trim())
              .filter(Boolean),
          );
          let lastMatchedRun = null;

          if (!sha) {
            core.info('No head_sha supplied; skipping wait');
            return;
          }

          async function listRunJobs(run) {
            const jobs = [];
            let page = 1;
            for (;;) {
              const { data } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
                page,
              });
              jobs.push(...(data.jobs || []));
              if (!data.jobs || data.jobs.length < 100) {
                return jobs;
              }
              page += 1;
            }
          }

          function jobIsIgnored(job) {
            return ignoredFailureJobs.has(job.name);
          }

          function isAcceptedJobConclusion(job) {
            return job.conclusion === 'success' || job.conclusion === 'skipped';
          }

          function findBlockingJob(jobs, consideredJobs = null) {
            const considered = consideredJobs || jobs.filter((job) => !jobIsIgnored(job));
            return (
              considered.find((job) => job.status !== 'completed') ||
              considered.find((job) => job.conclusion && !isAcceptedJobConclusion(job))
            );
          }

          function appendJobDetail(summary, blockingJob) {
            if (!blockingJob) {
              return summary;
            }
            let detail = `${summary}; blocking job="${blockingJob.name}" status=${blockingJob.status} conclusion=${blockingJob.conclusion || '-'}`;
            if (blockingJob.runner_name) {
              detail += ` runner="${blockingJob.runner_name}"`;
            }
            if (blockingJob.labels && blockingJob.labels.length) {
              detail += ` labels="${blockingJob.labels.join(',')}"`;
            }
            const blockingStep = (blockingJob.steps || []).find((step) => step.status !== 'completed');
            if (blockingStep) {
              detail += ` step="${blockingStep.name}" step_status=${blockingStep.status} step_conclusion=${blockingStep.conclusion || '-'}`;
            }
            return detail;
          }

          async function ignoredFailureGatePassed(run) {
            if (!ignoredFailureJobs.size && !requiredJobs.size) {
              return false;
            }
            const jobs = await listRunJobs(run);
            const considered = requiredJobs.size
              ? jobs.filter((job) => requiredJobs.has(job.name))
              : jobs.filter((job) => !jobIsIgnored(job));
            if (requiredJobs.size) {
              const present = new Set(considered.map((job) => job.name));
              const missing = [...requiredJobs].filter((name) => !present.has(name));
              if (missing.length) {
                core.info(`${workflowId} run ${run.id}: waiting for required job(s) to appear: ${missing.join(', ')}`);
                return false;
              }
            } else if (run.status !== 'completed') {
              return false;
            }
            if (!considered.length) {
              return false;
            }
            const blockingJob = findBlockingJob(jobs, considered);
            if (blockingJob) {
              core.info(appendJobDetail(`${workflowId} run ${run.id}: waiting on non-ignored jobs`, blockingJob));
              return false;
            }
            const ignored = jobs.filter((job) => jobIsIgnored(job) && job.conclusion && !isAcceptedJobConclusion(job));
            if (ignored.length) {
              core.warning(
                `Ignoring non-blocking failed job(s): ${ignored.map((job) => `${job.name}=${job.conclusion}`).join(', ')}`,
              );
            }
            return true;
          }

          async function describeRun(run) {
            if (!run) {
              return `no ${workflowId} run found for ${sha}`;
            }

            let summary = `${workflowId} run ${run.id}: status=${run.status} conclusion=${run.conclusion}`;
            try {
              const jobs = await listRunJobs(run);
              const blockingJob =
                findBlockingJob(jobs) ||
                jobs.find((job) => job.status !== 'completed') ||
                jobs.find((job) => job.conclusion && !isAcceptedJobConclusion(job));

              if (!blockingJob) {
                return summary;
              }

              summary = appendJobDetail(summary, blockingJob);
            } catch (error) {
              summary += `; job detail unavailable: ${error.message || error}`;
            }
            return summary;
          }

          // When CI concludes with a non-success, wait one interval and re-check
          // before failing. A rerun transitions the same run back to in_progress,
          // so a single extra poll is enough to detect it without burning the
          // full timeout on genuine failures.
          let sawFailure = false;

          for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch,
              // GitHub's workflow-runs API can return an empty set when
              // combining workflow filename + head_sha, so filter SHA below.
              per_page: 50,
            };

            if (workflowEvent) {
              params.event = workflowEvent;
            }

            const { data } = await github.rest.actions.listWorkflowRuns(params);

            const run = data.workflow_runs.find((c) => c.head_sha === sha);
            if (run) {
              lastMatchedRun = run;
              core.info(`${workflowId} run ${run.id}: status=${run.status} conclusion=${run.conclusion}`);
              if (await ignoredFailureGatePassed(run)) {
                return;
              }
              if (run.status === 'completed') {
                if (!requireSuccess || run.conclusion === 'success') {
                  return;
                }
                if (sawFailure) {
                  // Still failed after one rerun grace period — give up
                  core.setFailed(`${workflowId} concluded ${run.conclusion} for ${sha}`);
                  return;
                }
                core.warning(`${workflowId} concluded ${run.conclusion} — waiting one interval to detect rerun`);
                sawFailure = true;
              } else if (sawFailure) {
                // Run transitioned back to in_progress — a rerun was queued; reset and keep waiting
                core.info(`${workflowId} run ${run.id} is back in_progress (rerun detected) — continuing to wait`);
                sawFailure = false;
              }
            } else {
              if (allowMissing && attempt >= missingGraceAttempts) {
                core.warning(`No ${workflowId} run appeared for ${sha} after ${attempt} attempts; continuing because allow_missing=true`);
                return;
              }
              core.info(`No ${workflowId} run found yet for ${sha} on ${branch} (attempt ${attempt}/${maxAttempts})`);
            }

            await new Promise((resolve) => setTimeout(resolve, delayMs));
          }

          if (allowMissing) {
            core.warning(`Timed out waiting for ${workflowId} run for ${sha}; ${await describeRun(lastMatchedRun)}; continuing because allow_missing=true`);
            return;
          }

          if (requireSuccess) {
            core.setFailed(`Timed out waiting for ${workflowId} to pass for ${sha}; ${await describeRun(lastMatchedRun)}`);
            return;
          }

          core.setFailed(`Timed out waiting for ${workflowId} to complete for ${sha}; ${await describeRun(lastMatchedRun)}`);
