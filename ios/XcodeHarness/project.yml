name: LonghouseIOS

options:
  minimumXcodeGenVersion: 2.45.3
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"

packages:
  LonghousePackage:
    path: ..
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  SnapshotPreviews:
    url: https://github.com/EmergeTools/SnapshotPreviews
    from: "0.14.0"

targets:
  Longhouse:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Sources/LonghouseApp
        createIntermediateGroups: true
      - path: ../Sources/Shared
        createIntermediateGroups: true
      - path: ../Resources/Assets.xcassets
        buildPhase: resources
        createIntermediateGroups: true
      # Required resource. If xcodegen can't find the file, fail loudly.
      # The Makefile/CI path generates it before project generation, and the
      # Xcode pre-build phase refreshes it again for direct phone builds.
      - path: ../Resources/build-identity.json
        buildPhase: resources
        createIntermediateGroups: true
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - target: LonghouseWidgetExtension
        embed: true
    configFiles:
      Debug: Configs/Longhouse.xcconfig
      Release: Configs/Longhouse.xcconfig
    preBuildScripts:
      # Always refresh the bundled build-identity.json. The script regenerates
      # identity before copying so direct Xcode builds cannot bundle stale
      # commit metadata after a new commit.
      - script: "\"$PROJECT_DIR/../../scripts/build/stage_ios_build_identity.sh\""
        name: Stage build identity
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios
        PRODUCT_NAME: Longhouse
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Longhouse.entitlements
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    info:
      path: Info.plist
      properties:
        GIDClientID: 658453123272-8d0plghk6gbsgamhp66rn8gi2vbc65i2.apps.googleusercontent.com
        UIBackgroundModes:
          - remote-notification
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.658453123272-8d0plghk6gbsgamhp66rn8gi2vbc65i2
          - CFBundleURLSchemes:
              - ai.longhouse.ios

  LonghouseWidgetExtension:
    type: app-extension
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Sources/LonghouseWidget
        createIntermediateGroups: true
      - path: ../Sources/Shared
        createIntermediateGroups: true
    configFiles:
      Debug: Configs/Longhouse.xcconfig
      Release: Configs/Longhouse.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios.widget
        PRODUCT_NAME: LonghouseWidget
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: LonghouseWidget.entitlements
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    info:
      path: WidgetInfo.plist
      properties:
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  LonghouseIOSTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Tests/LonghouseIOSTests
        createIntermediateGroups: true
    dependencies:
      - target: Longhouse
      - package: SnapshotPreviews
        product: SnapshottingTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Longhouse.app/Longhouse"
        BUNDLE_LOADER: "$(TEST_HOST)"

  LonghouseIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Tests/LonghouseIOSUITests
        createIntermediateGroups: true
    dependencies:
      - target: Longhouse
    configFiles:
      Debug: Configs/Longhouse.xcconfig
      Release: Configs/Longhouse.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TEST_TARGET_NAME: Longhouse

schemes:
  Longhouse:
    build:
      targets:
        Longhouse: all
        LonghouseWidgetExtension: all
        LonghouseIOSTests: [test]
    run:
      config: Debug
      executable: Longhouse
    test:
      config: Debug
      targets:
        - LonghouseIOSTests

  LonghouseSmoke:
    build:
      targets:
        Longhouse: all
        LonghouseWidgetExtension: all
        LonghouseIOSUITests: [test]
    run:
      config: Debug
      executable: Longhouse
    test:
      config: Debug
      testPlans:
        - path: TestPlans/LonghouseSmoke.xctestplan
          defaultPlan: true
