name: LonghouseIOS

options:
  minimumXcodeGenVersion: 2.45.3
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"

packages:
  LonghousePackage:
    path: ..
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  Longhouse:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Sources/LonghouseApp
        createIntermediateGroups: true
      - path: ../Sources/Shared
        createIntermediateGroups: true
    resources:
      - path: ../Resources/Assets.xcassets
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - target: LonghouseWidgetExtension
        embed: true
    configFiles:
      Debug: Configs/Signing.xcconfig
      Release: Configs/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios
        PRODUCT_NAME: Longhouse
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: Longhouse.entitlements
    info:
      path: Info.plist
      properties:
        GIDClientID: 658453123272-8d0plghk6gbsgamhp66rn8gi2vbc65i2.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.658453123272-8d0plghk6gbsgamhp66rn8gi2vbc65i2
          - CFBundleURLSchemes:
              - ai.longhouse.ios

  LonghouseWidgetExtension:
    type: app-extension
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Sources/LonghouseWidget
        createIntermediateGroups: true
      - path: ../Sources/Shared
        createIntermediateGroups: true
    configFiles:
      Debug: Configs/Signing.xcconfig
      Release: Configs/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios.widget
        PRODUCT_NAME: LonghouseWidget
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: LonghouseWidget.entitlements
    info:
      path: WidgetInfo.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  LonghouseIOSTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Tests/LonghouseIOSTests
        createIntermediateGroups: true
    dependencies:
      - target: Longhouse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Longhouse.app/Longhouse"
        BUNDLE_LOADER: "$(TEST_HOST)"

  LonghouseIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: ../Tests/LonghouseIOSUITests
        createIntermediateGroups: true
    dependencies:
      - target: Longhouse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.longhouse.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TEST_TARGET_NAME: Longhouse

schemes:
  Longhouse:
    build:
      targets:
        Longhouse: all
        LonghouseWidgetExtension: all
        LonghouseIOSTests: [test]
    run:
      config: Debug
      executable: Longhouse
    test:
      config: Debug
      targets:
        - LonghouseIOSTests

  LonghouseSmoke:
    build:
      targets:
        Longhouse: all
        LonghouseWidgetExtension: all
        LonghouseIOSUITests: [test]
    run:
      config: Debug
      executable: Longhouse
    test:
      config: Debug
      testPlans:
        - path: TestPlans/LonghouseSmoke.xctestplan
          defaultPlan: true
