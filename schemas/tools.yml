asyncapi: 3.0.0

info:
  title: Zerg Tool Registry Contract
  version: 1.0.0
  description: |
    Tool definitions and contracts for cross-service validation.
    Ensures frontend tool references match backend tool registry.

defaultContentType: application/json

components:
  schemas:
    ToolName:
      type: string
      description: Built-in tool names available in the registry
      enum:
        - get_current_time
        - datetime_diff
        - http_request
        - memory_write
        - memory_read
        - memory_ls
        - memory_search
        - memory_delete
        - notion_create_page
        - notion_get_page
        - notion_update_page
        - notion_search
        - notion_query_database
        - notion_append_blocks
        - runner_exec
        - runner_list
        - runner_create_enroll_token
        - runner_doctor
        - send_slack_webhook
        - search_sessions
        - grep_sessions
        - filter_sessions
        - get_session_detail
        - send_telegram
        - web_fetch
        - web_search
        - list_tools
        - search_tools

    ServerName:
      type: string
      description: Server/module names for tools
      enum:
        - datetime
        - http
        - memory
        - notion
        - runner
        - runner_setup
        - slack
        - coordination
        - session
        - telegram
        - web_fetch
        - web_search
        - tool_discovery

    ToolDefinition:
      type: object
      description: Complete tool definition with metadata
      properties:
        name:
          $ref: '#/components/schemas/ToolName'
        server_name:
          $ref: '#/components/schemas/ServerName'
        description:
          type: string
        parameters:
          type: object
          description: Tool parameter schema (from LangChain StructuredTool)
        visibility:
          $ref: '#/components/schemas/ToolVisibility'
      required:
        - name
        - server_name
        - description

    ToolVisibility:
      type: string
      description: Tool visibility settings
      enum:
        - AlwaysExternal
        - Internal
        - OptionalExternal

    ToolRegistry:
      type: object
      description: Registry mapping tools to their servers
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        tool_mappings:
          type: object
          description: Tool name to server mapping
          properties:
            get_current_time:
              const: datetime
            datetime_diff:
              const: datetime
            http_request:
              const: http
            memory_write:
              const: memory
            memory_read:
              const: memory
            memory_ls:
              const: memory
            memory_search:
              const: memory
            memory_delete:
              const: memory
            notion_create_page:
              const: notion
            notion_get_page:
              const: notion
            notion_update_page:
              const: notion
            notion_search:
              const: notion
            notion_query_database:
              const: notion
            notion_append_blocks:
              const: notion
            runner_exec:
              const: runner
            runner_list:
              const: runner_setup
            runner_create_enroll_token:
              const: runner_setup
            runner_doctor:
              const: runner_setup
            send_slack_webhook:
              const: slack
            search_sessions:
              const: session
            grep_sessions:
              const: session
            filter_sessions:
              const: session
            get_session_detail:
              const: session
            send_telegram:
              const: telegram
            web_fetch:
              const: web_fetch
            web_search:
              const: web_search
            list_tools:
              const: tool_discovery
            search_tools:
              const: tool_discovery
          required:
            - get_current_time
            - datetime_diff
            - http_request
            - memory_write
            - memory_read
            - memory_ls
            - memory_search
            - memory_delete
            - notion_create_page
            - notion_get_page
            - notion_update_page
            - notion_search
            - notion_query_database
            - notion_append_blocks
            - runner_exec
            - runner_list
            - runner_create_enroll_token
            - runner_doctor
            - send_slack_webhook
            - search_sessions
            - grep_sessions
            - filter_sessions
            - get_session_detail
            - send_telegram
            - web_fetch
            - web_search
            - list_tools
            - search_tools

  messages:
    ToolAvailabilityContract:
      description: Contract for tool availability validation
      payload:
        type: object
        properties:
          expected_tools:
            type: array
            items:
              $ref: '#/components/schemas/ToolName'
          version:
            type: string
        required:
          - expected_tools
          - version

    ToolSignatureContract:
      description: Contract for tool parameter validation
      payload:
        type: object
        properties:
          tool_name:
            $ref: '#/components/schemas/ToolName'
          expected_parameters:
            type: array
            items:
              type: string
          version:
            type: string
        required:
          - tool_name
          - expected_parameters
          - version
