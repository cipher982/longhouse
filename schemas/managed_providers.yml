schema_version: 1
# requires_longhouse_cli means the Machine Agent still needs the
# Python-packaged longhouse CLI for remote-control shellouts. It does not mean
# all device Python has been removed; the no-Python device inventory separately
# tracks entrypoint, health/repair, proof, and scaffold debt.
providers:
- provider: codex
  provider_cli_binary: codex
  provider_cli_env: LONGHOUSE_CODEX_BIN
  requires_longhouse_cli: false
  managed_transport: codex_app_server
  control_plane: codex_bridge
  control_plane_aliases:
  - codex_app_server
  launch_local: true
  launch_remote: true
  run_once: true
  reattach: true
  send_input: true
  interrupt: true
  steer_active_turn: true
  answer_pause: true
  terminate: true
  tail_output: true
  runtime_phase: true
  transcript_binding: true
  can_resume: true
  operation_evidence:
    launch_local:
      level: live_no_token
      source: scripts/qa/codex-provider-release-canary.py managed_tui_attach
      next: promote to live_token when scheduled prompt canary is budgeted
    launch_remote:
      level: live_no_token
      source: scripts/qa/codex-provider-release-canary.py detached_ui
      next: prove through Runtime Host remote launch smoke
    run_once:
      level: hermetic
      source: engine codex_exec argv/runtime terminal tests plus server one-shot launch
        tests
      next: promote with live token codex exec transcript canary
    reattach:
      level: live_no_token
      source: scripts/qa/codex-provider-release-canary.py managed_tui_attach --remote
      next: assert resume after process restart
    send_input:
      level: hermetic
      source: engine codex_bridge IPC turn/start tests
      next: promote with live token send transcript canary
    interrupt:
      level: hermetic
      source: engine codex_bridge turn/interrupt tests
      next: promote with live token interrupt canary
    steer_active_turn:
      level: hermetic
      source: engine codex_bridge turn/steer active-turn tests
      next: promote with live token steer transcript canary
    answer_pause:
      level: hermetic
      source: engine codex_bridge pause-answer command tests
      next: promote with live token pause-answer transcript canary
    terminate:
      level: hermetic
      source: engine bridge stop and process cleanup tests
    tail_output:
      level: live_no_token
      source: Codex bridge rollout/transcript binding canaries
    runtime_phase:
      level: hermetic
      source: engine codex_bridge runtime event reducer tests
      next: promote with live runtime phase canary
    transcript_binding:
      level: hermetic
      source: Codex hook and rollout ingestion tests
      next: promote with live transcript assertion
  machine_control_supports:
  - codex.send
  - codex.interrupt
  - codex.steer
  - codex.answer_pause
  - codex.launch
  - codex.continue
  - codex.run_once
  - codex.resume_run_once
- provider: claude
  provider_cli_binary: claude
  provider_cli_env: null
  requires_longhouse_cli: true
  managed_transport: claude_channel_bridge
  control_plane: claude_channel_bridge
  control_plane_aliases: []
  launch_local: true
  launch_remote: true
  run_once: false
  reattach: true
  send_input: true
  interrupt: true
  steer_active_turn: true
  answer_pause: true
  terminate: true
  tail_output: true
  runtime_phase: true
  transcript_binding: true
  can_resume: true
  operation_evidence:
    launch_local:
      level: live_no_token
      source: longhouse provider-live canary --provider claude binary/auth/channel/PTY
        checks
      next: promote with detached channel launch transcript canary
    launch_remote:
      level: source_review
      source: provider-control-e2e Claude fake process plus Machine Agent claude.launch
        support tests
      next: promote with Runtime Host remote launch against real Claude or a hermetic
        engine launch happy-path
    run_once:
      level: none
      source: run-once canary not implemented yet
    reattach:
      level: hermetic
      source: Claude channel bridge session state and resume unit coverage
      next: prove launch, process restart, reattach, send against same session id
    send_input:
      level: hermetic
      source: scripts/qa/provider-control-e2e-canary.py Claude channel send delivery;
        provider-response prompt proof belongs to release canaries
    interrupt:
      level: hermetic
      source: scripts/qa/provider-control-e2e-canary.py Claude channel interrupt sends
        SIGINT
    steer_active_turn:
      level: live_token
      source: make managed-claude-poc delayed intent=steer transcript assertion
      next: promote to scheduled live token canary
    answer_pause:
      level: hermetic
      source: Claude channel bridge pause-answer command tests
      next: promote with live token pause-answer transcript canary
    terminate:
      level: hermetic
      source: Claude channel/process control tests
      next: prove graceful process cleanup in live remote launch lane
    tail_output:
      level: hermetic
      source: Claude transcript ingest and channel observation tests
    runtime_phase:
      level: hermetic
      source: Claude hooks/channel runtime phase tests
      next: prove freshness in live active-turn canary
    transcript_binding:
      level: hermetic
      source: Claude hook transcript binding tests
      next: promote when Claude release-canary live transcript assertion exists
  machine_control_supports:
  - claude.send
  - claude.interrupt
  - claude.steer
  - claude.answer_pause
  - claude.launch
  - claude.continue
- provider: opencode
  provider_cli_binary: opencode
  provider_cli_env: LONGHOUSE_OPENCODE_BIN
  requires_longhouse_cli: false
  managed_transport: opencode_server_bridge
  control_plane: opencode_server_bridge
  control_plane_aliases: []
  launch_local: true
  launch_remote: true
  run_once: false
  reattach: true
  send_input: true
  interrupt: true
  steer_active_turn: false
  answer_pause: false
  terminate: true
  tail_output: true
  runtime_phase: true
  transcript_binding: true
  can_resume: false
  operation_evidence:
    launch_local:
      level: live_no_token
      source: longhouse provider-live canary --provider opencode server readiness/schema/session
        checks
      next: promote with release-canary prompt transcript proof
    launch_remote:
      level: hermetic
      source: provider-control-e2e OpenCode fake server bridge launch
      next: promote with Runtime Host remote launch against real OpenCode
    run_once:
      level: none
      source: run-once canary not implemented yet
    reattach:
      level: live_no_token
      source: longhouse provider-live canary OpenCode process-restart session recovery
        plus attach command shape
      next: promote with an explicit live-token release lane
    send_input:
      level: live_no_token
      source: longhouse provider-live canary OpenCode prompt_async noReply delivery
        through session.messages
      next: promote with release-canary assistant response proof
    interrupt:
      level: live_no_token
      source: longhouse provider-live canary OpenCode abort endpoint against a created
        session
      next: promote with release-canary active-turn abort proof
    steer_active_turn:
      level: none
      source: unsupported until OpenCode active-turn injection semantics are proven
    answer_pause:
      level: none
      source: unsupported until OpenCode pause-answer semantics are proven
    terminate:
      level: hermetic
      source: OpenCode server bridge stop/cleanup tests
    tail_output:
      level: hermetic
      source: OpenCode plugin transcript observation tests
      next: promote with live transcript assertion
    runtime_phase:
      level: hermetic
      source: OpenCode plugin runtime event tests
      next: prove freshness in live active-turn canary
    transcript_binding:
      level: live_no_token
      source: longhouse provider-live canary OpenCode session.messages noReply marker
        assertion
      next: promote with release-canary assistant transcript assertion
  machine_control_supports:
  - opencode.send
  - opencode.interrupt
  - opencode.launch
  - opencode.terminate
- provider: antigravity
  provider_cli_binary: agy
  provider_cli_env: LONGHOUSE_ANTIGRAVITY_BIN
  requires_longhouse_cli: true
  managed_transport: antigravity_hook_inbox
  control_plane: antigravity_hook_inbox
  control_plane_aliases: []
  launch_local: true
  launch_remote: false
  run_once: false
  reattach: false
  send_input: true
  interrupt: false
  steer_active_turn: false
  answer_pause: false
  terminate: false
  tail_output: true
  runtime_phase: true
  transcript_binding: true
  can_resume: false
  operation_evidence:
    launch_local:
      level: live_no_token
      source: longhouse provider-live canary --provider antigravity version/help/plugin
        checks
      next: prove real agy loop invocation
    launch_remote:
      level: none
      source: unsupported until Antigravity launch semantics are proven
    run_once:
      level: none
      source: run-once canary not implemented yet
    reattach:
      level: none
      source: unsupported until Antigravity exposes stable reattach
    send_input:
      level: live_token
      source: scripts/qa/provider-control-e2e-canary.py --provider antigravity --antigravity-real-agy-send
        proves real agy PreInvocation hook-inbox injection changes the model-visible
        turn
      next: keep interrupt, active-turn steer, and continuation gated on separate
        bounded-behavior canaries
    interrupt:
      level: none
      source: unsupported until graceful stop semantics are proven
    steer_active_turn:
      level: none
      source: unsupported until bounded active-turn injection is proven
    answer_pause:
      level: none
      source: unsupported until pause-answer semantics are proven
    terminate:
      level: none
      source: unsupported until process termination policy is designed
    tail_output:
      level: hermetic
      source: Antigravity hook transcript binding tests
      next: promote with real agy transcript canary
    runtime_phase:
      level: hermetic
      source: Antigravity hook runtime outbox tests
      next: promote with real agy phase canary
    transcript_binding:
      level: hermetic
      source: Antigravity hook binding tests
      next: promote with real agy transcript assertion
  machine_control_supports:
  - antigravity.send
- provider: cursor
  provider_cli_binary: cursor-agent
  provider_cli_env: LONGHOUSE_CURSOR_BIN
  requires_longhouse_cli: false
  managed_transport: cursor_exec
  control_plane: cursor_exec
  control_plane_aliases: []
  launch_local: false
  launch_remote: true
  run_once: true
  reattach: false
  send_input: false
  interrupt: false
  steer_active_turn: false
  answer_pause: false
  terminate: false
  tail_output: true
  runtime_phase: true
  transcript_binding: true
  can_resume: true
  operation_evidence:
    launch_local:
      level: none
      source: 'unsupported: Helm (invisible interactive TUI + remote control) is blocked
        until cursor-agent exposes a steerable interactive control surface. Do not ship
        a headless one-off as the local wrapper.'
    launch_remote:
      level: hermetic
      source: engine cursor_exec argv/runtime terminal tests plus server one-shot launch
        dispatch tests
      next: promote with live-token cursor-agent --print stream-json transcript canary
    run_once:
      level: hermetic
      source: engine cursor_exec spawns cursor-agent --print --output-format stream-json
        and ships real timestamp_ms events
      next: promote with live one-shot transcript canary
    reattach:
      level: none
      source: 'unsupported: cursor-agent --print has no attach-to-live-process surface;
        --resume <chatId> starts a new one-shot turn, not a reattach'
    send_input:
      level: none
      source: 'unsupported mid-turn: --print one-shot has no stdin injection. Follow-up
        turns use can_resume (--resume <chatId> <prompt>), not send_input'
    interrupt:
      level: none
      source: 'unsupported: no mid-turn interrupt surface for headless --print. Use terminate
        (kill process group) instead.'
    steer_active_turn:
      level: none
      source: unsupported until Cursor exposes a mid-turn injection API
    answer_pause:
      level: none
      source: unsupported until Cursor exposes pause-answer semantics
    terminate:
      level: none
      source: 'unsupported in v1: cursor_exec relies on kill_on_drop for child cleanup
        (same as codex one-shot). A pid-registry terminate command is a follow-up;
        do not advertise cursor.terminate until it is wired.'
    tail_output:
      level: hermetic
      source: cursor_exec consumes stream-json stdout with real per-event timestamp_ms
      next: promote with live transcript assertion
    runtime_phase:
      level: hermetic
      source: stream-json assistant/tool_call events carry real timestamp_ms / startedAtMs
        / completedAtMs
      next: prove freshness in live one-shot canary
    transcript_binding:
      level: hermetic
      source: cursor_exec binds tool_call started/completed by toolCallId and session_id
        from the stream-json system init event
      next: promote with live transcript binding assertion
  machine_control_supports:
  - cursor.run_once
  - cursor.resume_run_once
